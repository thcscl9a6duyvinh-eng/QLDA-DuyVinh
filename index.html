              <button data-gantt-del="${t.id}" data-gantt-linked="${isLinked}" style="border:none;background:none;color:${c.red};cursor:pointer;padding:5px 8px;border-radius:6px;" title="${isLinked?'Xóa liên kết (sẽ tự thêm lại nếu task còn trong dự án)':'Xóa'}"><i class="ti ti-${isLinked?'unlink':'trash'}" style="font-size:16px;"></i></button>
            </td>
          </tr>`;
        }).join('');

    const tableHtml = syncBannerHtml + `<div style="${cardStyle}overflow:hidden;padding:0;">
      <div style="padding:16px 20px;border-bottom:1px solid ${c.border};display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
        <h3 style="margin:0;font-size:16px;font-weight:650;"><i class="ti ti-list-details" style="vertical-align:-2px;margin-right:6px;color:${c.accent};"></i>Danh sách công việc (${ganttTasks.length})</h3><span style="font-size:12px;color:${c.sub};"><i class="ti ti-arrows-move" style="vertical-align:-2px;"></i> Kéo thả tại đây để sắp xếp; Biểu đồ Gantt sẽ lấy đúng thứ tự này</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button id="gantt-clear-btn" style="border:1px solid ${c.border};background:${c.card};color:${c.red};font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer;">
            <i class="ti ti-trash" style="vertical-align:-2px;"></i> Xóa tất cả</button>
          <button id="gantt-export-btn" style="border:none;background:${c.green};color:#fff;font-size:13px;font-weight:600;padding:7px 14px;border-radius:8px;cursor:pointer;">
            <i class="ti ti-file-spreadsheet" style="vertical-align:-2px;margin-right:4px;"></i>Xuất Excel</button>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;min-width:860px;">
          <thead>
            <tr>
              <th style="${thStyle}width:70px;">WBS</th>
              <th style="${thStyle}min-width:200px;">Nội dung công việc</th>
              <th style="${thStyle}min-width:150px;">Đơn vị thực hiện</th>
              <th style="${thStyle}width:110px;">Bắt đầu</th>
              <th style="${thStyle}width:110px;">Kết thúc</th>
              <th style="${thStyle}width:70px;">Ngày</th>
              <th style="${thStyle}min-width:140px;">Tiến độ</th>
              <th style="${thStyle}min-width:120px;">Ghi chú</th>
              <th style="${thStyle}width:90px;text-align:center;">Thao tác</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>`;

    contentHtml = formHtml + tableHtml;

  } else {
    // --- GANTT CHART ---
    contentHtml = renderGanttChart(c, cardStyle);
  }

  return `
  <div id="gantt-section">
    <!-- Meta info -->
    <div style="${cardStyle}">
      <h3 style="margin:0 0 14px;font-size:16px;font-weight:650;"><i class="ti ti-settings" style="vertical-align:-2px;margin-right:6px;color:${c.accent};"></i>Thông tin báo cáo</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;">
        <div>
          <label style="font-size:12px;color:${c.sub};display:block;margin-bottom:5px;">Tên dự án / công trình</label>
          <input id="gantt-proj-name" type="text" value="${escapeHtml(ganttProjectName)}" placeholder="Tên công trình..." style="width:100%;box-sizing:border-box;font-size:14px;padding:10px 12px;border:1px solid ${c.border};border-radius:10px;background:${c.inputBg};color:${c.text};"/>
        </div>
        <div>
          <label style="font-size:12px;color:${c.sub};display:block;margin-bottom:5px;">Ngày báo cáo</label>
          <input id="gantt-report-date" type="date" value="${ganttReportDate||todayStr()}" style="width:100%;box-sizing:border-box;font-size:14px;padding:10px 12px;border:1px solid ${c.border};border-radius:10px;background:${c.inputBg};color:${c.text};"/>
        </div>
      </div>
    </div>

    ${statsHtml}
    ${tabsHtml}
    ${contentHtml}
  </div>`;
}

function renderGanttChart(c, cardStyle){
  const validTasks = ganttTasks.filter(t=>t.start&&t.end);
  if(validTasks.length === 0){
    return `<div style="${cardStyle}text-align:center;padding:48px;color:${c.sub};">
      <i class="ti ti-chart-gantt" style="font-size:48px;opacity:.3;display:block;margin-bottom:12px;"></i>
      <p style="margin:0;font-size:15px;">Chưa có công việc có ngày bắt đầu/kết thúc để vẽ biểu đồ.</p>
      <p style="margin:8px 0 0;font-size:13px;">Hãy sang tab <b>Danh sách & Nhập liệu</b> để thêm công việc.</p>
    </div>`;
  }

  const minDate = new Date(Math.min(...validTasks.map(t=>new Date(t.start))));
  const maxDate = new Date(Math.max(...validTasks.map(t=>new Date(t.end))));
  const totalDays = daysBetween(minDate.toISOString(), maxDate.toISOString()) + 1;
  const today = new Date(); today.setHours(0,0,0,0);
  const isDark = theme === 'dark';

  const COL_W  = 28;   // px mỗi ngày
  const ROW_H  = 34;   // px mỗi hàng
  const TASK_W = 290;  // px cột tên công việc
  const UNIT_W = 150;  // px cột đơn vị thực hiện
  const LBL_W  = TASK_W + UNIT_W;

  // Màu sắc
  const BG       = isDark ? '#2c2c2e' : '#ffffff';
  const LBL_BG   = isDark ? '#1d1d1f' : '#f2f6f9';
  const HDR_BG   = isDark ? '#1a3a4e' : '#1f4f67';
  const HDR2_BG  = isDark ? '#152f3e' : '#174459';
  const BORDER   = isDark ? 'rgba(255,255,255,0.09)' : 'rgba(0,0,0,0.09)';
  const TEXT     = isDark ? '#f0f0f2' : '#1e2d35';
  const SUB      = isDark ? 'rgba(255,255,255,0.50)' : 'rgba(0,0,0,0.42)';
  const WE_BG    = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)';
  const ROW_ALT  = isDark ? 'rgba(255,255,255,0.025)' : 'rgba(0,0,0,0.02)';
  const SHADOW_R = isDark ? 'rgba(0,0,0,0.5)' : 'rgba(0,0,0,0.12)'; // shadow phải cột label
  const SHADOW_B = isDark ? 'rgba(0,0,0,0.5)' : 'rgba(0,0,0,0.10)'; // shadow dưới header

  // Build month groups
  const months = [];
  let cM=null,cC=0,cS=0;
  for(let i=0;i<totalDays;i++){
    const d=addDays(minDate,i);
    const mk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    if(mk!==cM){ if(cM!==null) months.push({label:cM,count:cC,start:cS}); cM=mk;cC=1;cS=i; } else cC++;
  }
  if(cM) months.push({label:cM,count:cC,start:cS});
  const fmtM = key => { const[y,m]=key.split('-'); return new Date(y,m-1).toLocaleDateString('vi-VN',{month:'short',year:'numeric'}); };

  const todayOff = today>=minDate&&today<=maxDate ? daysBetween(minDate.toISOString(),today.toISOString()) : -1;

  // ── Style chung cho cell ─────────────────────────────────────────────
  const tdBase  = `border:none;border-bottom:1px solid ${BORDER};border-right:1px solid ${BORDER};padding:0;margin:0;`;
  const thBase  = `border:none;border-right:1px solid ${BORDER};padding:0;margin:0;font-weight:normal;`;

  // ── Hàng THÁNG ──────────────────────────────────────────────────────
  // Corner cell tháng (sticky top+left)
  let monthRow = `<tr>
    <th class="gantt-th-corner gantt-th-month"
        style="${thBase}width:${LBL_W}px;min-width:${LBL_W}px;max-width:${LBL_W}px;height:26px;
               background:${HDR_BG};
               box-shadow:2px 0 6px ${SHADOW_R}, 0 2px 6px ${SHADOW_B};">
      <div style="display:grid;grid-template-columns:${TASK_W}px ${UNIT_W}px;height:26px;
                  font-size:11px;font-weight:700;color:#fff;">
        <span style="display:flex;align-items:center;justify-content:center;border-right:1px solid rgba(255,255,255,0.24);">Nội dung công việc</span>
        <span style="display:flex;align-items:center;justify-content:center;">Đơn vị thực hiện</span>
      </div>
    </th>`;
  // Tháng cells
  months.forEach(m => {
    monthRow += `<th colspan="${m.count}" class="gantt-th-month"
        style="${thBase}height:26px;background:${HDR_BG};
               box-shadow:0 2px 4px ${SHADOW_B};">
      <div style="display:flex;align-items:center;justify-content:center;height:26px;
                  font-size:11px;font-weight:700;color:#fff;white-space:nowrap;">
        ${fmtM(m.label)}
      </div>
    </th>`;
  });
  monthRow += `</tr>`;

  // ── Hàng NGÀY ───────────────────────────────────────────────────────
  // Corner cell ngày (sticky top+left)
  let dayRow = `<tr>
    <th class="gantt-th-corner gantt-th-day"
        style="${thBase}width:${LBL_W}px;min-width:${LBL_W}px;max-width:${LBL_W}px;height:26px;
               background:${LBL_BG};
               box-shadow:2px 2px 6px ${SHADOW_R};
               border-top:1px solid ${BORDER};">
    </th>`;
  for(let i=0;i<totalDays;i++){
    const d = addDays(minDate,i);
    const isWE = d.getDay()===0||d.getDay()===6;
    const isToday = i===todayOff;
    dayRow += `<th class="gantt-th-day"
        style="${thBase}width:${COL_W}px;min-width:${COL_W}px;max-width:${COL_W}px;height:26px;
               background:${isToday?'rgba(199,91,75,0.18)':isWE?WE_BG:isDark?'#242426':'#f9fbfc'};
               border-top:1px solid ${BORDER};
               box-shadow:0 2px 4px ${SHADOW_B};">
      <div style="display:flex;align-items:center;justify-content:center;height:26px;
                  font-size:10px;color:${isToday?'#c75b4b':isWE?'#c75b4b':SUB};
                  font-weight:${isToday?'700':'400'};">
        ${d.getDate()}
      </div>
    </th>`;
  }
  dayRow += `</tr>`;

  // ── Hàng DỮ LIỆU (mỗi task) ─────────────────────────────────────────
  let dataRows = '';
  ganttTasks.forEach((t, idx) => {
    const rowBg = idx%2===0 ? BG : ROW_ALT;
    const isBold = !t.start||!t.end||(t.wbs&&t.wbs.split('.').length<=1);
    const label = (t.wbs?t.wbs+' ':'')+t.name;
    const displayLabel = label.length>36 ? label.slice(0,35)+'…' : label;
    const unitLabel = ganttUnit(t);
    const displayUnit = unitLabel.length>22 ? unitLabel.slice(0,21)+'...' : unitLabel;

    // Label cell: sticky left
    dataRows += `<tr data-gantt-chart-row="${t.id}">
      <td class="gantt-td-label"
          style="${tdBase}width:${LBL_W}px;min-width:${LBL_W}px;max-width:${LBL_W}px;height:${ROW_H}px;
                 background:${LBL_BG};
                 box-shadow:2px 0 6px ${SHADOW_R};">
        <div style="height:${ROW_H}px;display:grid;grid-template-columns:${TASK_W}px ${UNIT_W}px;align-items:center;overflow:hidden;">
          <div style="padding:0 8px 0 10px;display:flex;align-items:center;min-width:0;overflow:hidden;">
            ${t.projectTaskId?`<span style="display:inline-block;width:3px;height:18px;background:${c.accent};border-radius:2px;margin-right:7px;flex-shrink:0;"></span>`:''}
            <span style="font-size:${isBold?12:11}px;font-weight:${isBold?700:400};color:${TEXT};
                         white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escapeHtml(label)}">
              ${escapeHtml(displayLabel)}
            </span>
          </div>
          <div style="height:100%;padding:0 10px;border-left:1px solid ${BORDER};display:flex;align-items:center;min-width:0;">
            <span style="font-size:11px;color:${unitLabel?TEXT:SUB};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escapeHtml(unitLabel)}">
              ${unitLabel ? escapeHtml(displayUnit) : '-'}
            </span>
          </div>
        </div>
      </td>`;

    // Day cells
    for(let i=0;i<totalDays;i++){
      const d = addDays(minDate,i);
      const isWE = d.getDay()===0||d.getDay()===6;
      const isToday = i===todayOff;
      let cellBg = isToday ? 'rgba(199,91,75,0.08)' : isWE ? WE_BG : rowBg;

      // Kiểm tra task bar
      let barHtml = '';
      if(t.start && t.end){
        const startD = new Date(t.start); startD.setHours(0,0,0,0);
        const endD   = new Date(t.end);   endD.setHours(0,0,0,0);
        const taskStart = daysBetween(minDate.toISOString(), startD.toISOString());
        const taskEnd   = daysBetween(minDate.toISOString(), endD.toISOString());

        if(i >= taskStart && i <= taskEnd){
          const barColor = ganttBarColor(t);
          const prog = Number(t.progress)||0;
          const totalBarDays = taskEnd - taskStart + 1;
          const filledDays   = Math.round(totalBarDays * prog / 100);
          const dayInBar     = i - taskStart; // 0-based within bar
          const isFilled     = dayInBar < filledDays;

          const isFirst = i === taskStart;
          const isLast  = i === taskEnd;
          const rL = isFirst ? '4px' : '0';
          const rR = isLast  ? '4px' : '0';

          // Nền bar
          const bgOpacity = isFilled ? '1' : '0.22';
          barHtml = `<div style="
            position:absolute;inset:0;
            background:${barColor};
            opacity:${bgOpacity};
            border-radius:${rL} ${rR} ${rR} ${rL};
            margin:${(ROW_H-18)/2}px ${isLast?'2px':'0'} ${(ROW_H-18)/2}px ${isFirst?'2px':'0'};
          "></div>`;

          // Viền trái (đầu bar)
          if(isFirst) barHtml += `<div style="position:absolute;left:2px;top:${(ROW_H-18)/2}px;width:2px;height:18px;background:${barColor};border-radius:4px 0 0 4px;"></div>`;
          // Viền phải (cuối bar)
          if(isLast)  barHtml += `<div style="position:absolute;right:2px;top:${(ROW_H-18)/2}px;width:2px;height:18px;background:${barColor};border-radius:0 4px 4px 0;opacity:0.7;"></div>`;
          // % text (chỉ hiện ở ô giữa bar)
          const midDay = Math.floor(taskStart + totalBarDays/2);
          if(i===midDay && totalBarDays*COL_W>40){
            const textCol = prog>=50?'#fff':barColor;
            barHtml += `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
              font-size:10px;font-weight:700;color:${textCol};pointer-events:none;z-index:1;">${prog}%</div>`;
          }
          cellBg = 'transparent'; // bar xử lý màu nền
        }
      }

      // Đường today
      const todayLine = isToday ? `<div style="position:absolute;top:0;left:50%;width:2px;height:100%;
        background:#c75b4b;opacity:0.7;transform:translateX(-50%);"></div>` : '';

      dataRows += `<td style="${tdBase}width:${COL_W}px;min-width:${COL_W}px;max-width:${COL_W}px;
                         height:${ROW_H}px;background:${cellBg};position:relative;">
        ${todayLine}${barHtml}
      </td>`;
    }
    dataRows += `</tr>`;
  });

  // ── Legend ───────────────────────────────────────────────────────────
  const legends = [
    {color:'#3d8b72',label:'Hoàn thành'},
    {color:'#b98338',label:'Đang thực hiện'},
    {color:'#c75b4b',label:'Trễ hạn'},
    {color:'#2f6b8a',label:'Chưa bắt đầu'},
  ];
  const legendHtml = `<div style="display:flex;gap:16px;flex-wrap:wrap;padding:10px 16px;
      background:${isDark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.03)'};border-top:1px solid ${c.border};">
    ${legends.map(l=>`<span style="display:flex;align-items:center;gap:5px;font-size:12px;color:${c.sub};">
      <span style="display:inline-block;width:18px;height:10px;background:${l.color};border-radius:3px;"></span>${l.label}
    </span>`).join('')}
    <span style="display:flex;align-items:center;gap:5px;font-size:12px;color:${c.sub};">
      <span style="display:inline-block;width:2px;height:14px;background:#c75b4b;border-radius:1px;margin:0 4px;"></span>Ngày hôm nay
    </span>
  </div>`;
  const chartShellStyle = `background:${isDark?'rgba(9,18,32,0.88)':'rgba(255,255,255,0.88)'};border:1px solid ${isDark?'rgba(232,244,255,0.28)':'rgba(255,255,255,0.86)'};border-radius:16px;margin-bottom:20px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.35),0 22px 58px ${isDark?'rgba(0,0,0,0.42)':'rgba(28,72,118,0.20)'};backdrop-filter:blur(16px) saturate(150%);-webkit-backdrop-filter:blur(16px) saturate(150%);`;

  return `<div style="${chartShellStyle}overflow:hidden;padding:0;">
    <!-- Toolbar -->
    <div style="padding:12px 20px;border-bottom:1px solid ${c.border};display:flex;align-items:center;
                justify-content:space-between;flex-wrap:wrap;gap:10px;">
      <div>
        <h3 style="margin:0;font-size:16px;font-weight:650;">
          <i class="ti ti-chart-gantt" style="vertical-align:-2px;margin-right:6px;color:${c.accent};"></i>Biểu đồ Gantt
        </h3>
        ${ganttProjectName ? `<p style="margin:4px 0 0;font-size:12px;color:${c.sub};">
          Dự án: ${escapeHtml(ganttProjectName)} · Ngày BC: ${formatDateVN(ganttReportDate||todayStr())} · Thứ tự lấy từ tab Danh sách & Nhập liệu
        </p>` : `<p style="margin:4px 0 0;font-size:12px;color:${c.sub};">Thứ tự hiển thị lấy từ tab Danh sách & Nhập liệu.</p>`}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <label title="Bật/tắt cột Đơn vị thực hiện trong bản in" style="border:1px solid ${c.border};background:${c.inputBg};color:${c.text};font-size:12px;font-weight:600;padding:8px 11px;border-radius:8px;display:flex;align-items:center;gap:7px;cursor:pointer;white-space:nowrap;">
          <input id="gantt-print-unit-toggle" type="checkbox" checked style="accent-color:${c.accent};margin:0;"/>
          In cột Đơn vị thực hiện
        </label>
        <button id="gantt-print-btn"
          style="border:1px solid ${c.accent};background:${c.card};color:${c.accent};font-size:13px;
                 font-weight:600;padding:8px 15px;border-radius:8px;cursor:pointer;
                 display:flex;align-items:center;gap:6px;">
          <i class="ti ti-printer" style="font-size:16px;"></i>In biểu đồ
        </button>
        <button id="gantt-export-btn2"
          style="border:none;background:${c.green};color:#fff;font-size:13px;
                 font-weight:600;padding:8px 15px;border-radius:8px;cursor:pointer;
                 display:flex;align-items:center;gap:6px;">
          <i class="ti ti-file-spreadsheet" style="font-size:16px;"></i>Xuất Excel
        </button>
      </div>
    </div>

    <!-- Bảng Gantt: 1 vùng scroll duy nhất, header & label dùng sticky -->
    <div class="gantt-scroll-wrap">
      <table class="gantt-table" style="background:${BG};">
        <thead>
          ${monthRow}
          ${dayRow}
        </thead>
        <tbody>
          ${dataRows}
        </tbody>
      </table>
    </div>

    ${legendHtml}
  </div>`;
}

// --- Drag & drop order helpers ---
function ganttOrderKey(t){
  return t && t.projectTaskId ? `linked:${t.projectTaskId}` : `unlinked:${t && t.id ? t.id : ''}`;
}
function normalizeGanttOrderKey(item){
  if(typeof item === 'string') return item;
  if(item && item.projectTaskId) return `linked:${item.projectTaskId}`;
  if(item && item.type === 'linked' && item.id) return `linked:${item.id}`;
  if(item && item.type === 'unlinked' && item.id) return `unlinked:${item.id}`;
  if(item && item.id) return `unlinked:${item.id}`;
  return '';
}
function applySavedGanttOrder(order, projectTasks){
  const keys = Array.isArray(order) ? order.map(normalizeGanttOrderKey).filter(Boolean) : [];
  const orderMap = new Map(keys.map((key,idx)=>[key,idx]));
  const projectRank = new Map((projectTasks||[]).map((t,idx)=>[t.id,idx]));
  if(orderMap.size){
    ganttTasks.sort((a,b)=>{
      const ak=ganttOrderKey(a), bk=ganttOrderKey(b);
      const ai=orderMap.has(ak) ? orderMap.get(ak) : 100000 + (a.projectTaskId ? (projectRank.get(a.projectTaskId) ?? 50000) : 60000);
      const bi=orderMap.has(bk) ? orderMap.get(bk) : 100000 + (b.projectTaskId ? (projectRank.get(b.projectTaskId) ?? 50000) : 60000);
      return ai-bi;
    });
    return;
  }

  const linked = [];
  const unlinked = [];
  ganttTasks.forEach(gt => { gt.projectTaskId ? linked.push(gt) : unlinked.push(gt); });
  linked.sort((a, b) => {
    const ai = projectRank.has(a.projectTaskId) ? projectRank.get(a.projectTaskId) : 99999;
    const bi = projectRank.has(b.projectTaskId) ? projectRank.get(b.projectTaskId) : 99999;
    return ai - bi;
  });
  ganttTasks = [...linked, ...unlinked];
}
function reorderGanttTasksByVisibleRows(section){
  const orderedIds = Array.from(section.querySelectorAll('[data-gantt-row]')).map(r=>r.dataset.ganttRow).filter(Boolean);
  if(!orderedIds.length) return;
  const map = new Map(ganttTasks.map(t=>[t.id,t]));
  const next = [];
  orderedIds.forEach(id=>{ if(map.has(id)) next.push(map.get(id)); });
  ganttTasks.forEach(t=>{ if(!next.includes(t)) next.push(t); });
  ganttTasks = next;
  ganttSave();
  refreshGanttSection();
}
function attachGanttDragSort(section, selector){
  let dragging = null;
  let changed = false;
  let committed = false;
  const rows = Array.from(section.querySelectorAll(selector));
  if(rows.length < 2) return;
  const clearOver = () => rows.forEach(r => r.classList.remove('drag-sort-over'));
  const commitOrder = () => {
    if(committed || !changed) return;
    committed = true;
    reorderGanttTasksByVisibleRows(section);
  };

  rows.forEach(row=>{
    row.addEventListener('dragstart', e=>{
      const interactive = e.target && e.target.closest && e.target.closest('input, textarea, select, button, [data-gantt-edit], [data-gantt-del]');
      if(interactive){ e.preventDefault(); return; }
      dragging = row;
      changed = false;
      committed = false;
      row.classList.add('drag-sort-ghost');
      if(e.dataTransfer){
        e.dataTransfer.effectAllowed='move';
        e.dataTransfer.setData('text/plain', row.dataset.ganttRow || '');
      }
    });
    row.addEventListener('dragend', ()=>{
      if(dragging) dragging.classList.remove('drag-sort-ghost');
      clearOver();
      // Chốt thứ tự ở dragend để chắc chắn dữ liệu thật đổi theo vị trí đang thấy,
      // kể cả khi sự kiện drop không rơi đúng vào từng dòng.
      setTimeout(commitOrder, 0);
      dragging = null;
    });
    row.addEventListener('dragover', e=>{
      if(!dragging || dragging === row) return;
      e.preventDefault();
      const rect = row.getBoundingClientRect();
      const after = e.clientY > rect.top + rect.height / 2;
      const beforeNode = after ? row.nextSibling : row;
      if(beforeNode !== dragging){
        row.parentNode.insertBefore(dragging, beforeNode);
        changed = true;
      }
      clearOver();
      row.classList.add('drag-sort-over');
    });
    row.addEventListener('drop', e=>{
      e.preventDefault();
      clearOver();
      commitOrder();
    });
  });
}


// --- Attach events ---
function attachGanttEvents(){
  const section = document.getElementById('gantt-section');
  if(!section) return;

  // Meta fields
  const projName = section.querySelector('#gantt-proj-name');
  if(projName) projName.oninput=()=>{ ganttProjectName=projName.value; ganttSave(); };
  const repDate = section.querySelector('#gantt-report-date');
  if(repDate) repDate.onchange=()=>{ ganttReportDate=repDate.value; ganttSave(); };

  // Add task
  const addBtn = section.querySelector('#gantt-add-btn');
  if(addBtn) addBtn.onclick=()=>{
    const name = section.querySelector('#gantt-new-name').value.trim();
    const wbs  = section.querySelector('#gantt-new-wbs').value.trim();
    const unit = section.querySelector('#gantt-new-unit').value.trim();
    const start= section.querySelector('#gantt-new-start').value;
    const end  = section.querySelector('#gantt-new-end').value;
    const prog = parseInt(section.querySelector('#gantt-new-progress').value)||0;
    const notes= section.querySelector('#gantt-new-notes').value.trim();
    const errEl= section.querySelector('#gantt-form-err');

    if(!name){ errEl.style.display='block'; errEl.textContent='⚠ Vui lòng nhập nội dung công việc.'; return; }
    if(start && end && new Date(end)<new Date(start)){ errEl.style.display='block'; errEl.textContent='⚠ Ngày kết thúc phải sau ngày bắt đầu.'; return; }
    errEl.style.display='none';
    ganttTasks.push({ id:uid(), wbs, name, unit, start, end, progress:Math.min(100,Math.max(0,prog)), notes });
    ganttSave();
    section.querySelector('#gantt-new-name').value='';
    section.querySelector('#gantt-new-wbs').value='';
    section.querySelector('#gantt-new-unit').value='';
    section.querySelector('#gantt-new-start').value='';
    section.querySelector('#gantt-new-end').value='';
    section.querySelector('#gantt-new-progress').value='0';
    section.querySelector('#gantt-new-notes').value='';
    refreshGanttSection();
  };
  // Enter key to add
  ['#gantt-new-name','#gantt-new-unit','#gantt-new-end'].forEach(sel=>{
    const el = section.querySelector(sel);
    if(el) el.onkeydown=e=>{ if(e.key==='Enter'&&addBtn) addBtn.click(); };
  });

  // Tab switch
  section.querySelectorAll('[data-gantt-tab]').forEach(btn=>{
    btn.onclick=()=>{ ganttActiveTab=btn.dataset.ganttTab; refreshGanttSection(); };
  });

  // Edit task
  section.querySelectorAll('[data-gantt-edit]').forEach(btn=>{
    btn.onclick=()=>{ ganttEditId=btn.dataset.ganttEdit; refreshGanttSection(); };
  });
  section.querySelectorAll('[data-gantt-cancel-edit]').forEach(btn=>{
    btn.onclick=()=>{ ganttEditId=null; refreshGanttSection(); };
  });

  // Save edit
  section.querySelectorAll('[data-gantt-save]').forEach(btn=>{
    btn.onclick=()=>{
      const id=btn.dataset.ganttSave;
      const row=btn.closest('tr');
      if(!row) return;
      const get=(f)=>{ const el=row.querySelector(`[data-gantt-edit-field="${f}"]`); return el?el.value:''; };
      const t=ganttTasks.find(x=>x.id===id);
      if(t){
        const nameEl = row.querySelector('[data-gantt-edit-field="name"]');
        const progressEl = row.querySelector('[data-gantt-edit-field="progress"]');
        const isLinkedTask = !!t.projectTaskId;
        const startVal = isLinkedTask ? (t.start || '') : get('start');
        const endVal = isLinkedTask ? (t.end || '') : get('end');
        if(!isLinkedTask && startVal && endVal && new Date(endVal) < new Date(startVal)){
          alert('Ngày kết thúc phải sau ngày bắt đầu.');
          return;
        }
        t.wbs=get('wbs');
        t.unit=get('unit');
        if(nameEl) t.name=nameEl.value;
        if(!isLinkedTask){ t.start=startVal; t.end=endVal; }
        const nextProgress = clampGanttProgress(parseInt(get('progress')) || 0);
        if(isLinkedTask && progressEl && String(nextProgress) !== String(progressEl.dataset.ganttOriginalProgress || '')){
          t.progressManual = true;
        }
        t.progress=nextProgress;
        t.notes=get('notes');
      }
      ganttEditId=null; ganttSave(); refreshGanttSection();
    };
  });

  // Delete
  section.querySelectorAll('[data-gantt-del]').forEach(btn=>{
    btn.onclick=()=>{
      const isLinked = btn.dataset.ganttLinked === 'true';
      if(isLinked){
        if(!confirm('Công việc này được liên kết tự động từ dự án.\n\n• Bấm OK: ngắt liên kết — xóa khỏi Gantt, nhưng nếu bạn mở lại dự án sẽ tự thêm lại.\n• Bấm Hủy: giữ nguyên.')) return;
        // Ngắt liên kết: xóa projectTaskId để không sync lại tự động lần này
        const t = ganttTasks.find(x=>x.id===btn.dataset.ganttDel);
        if(t) delete t.projectTaskId;
        ganttTasks = ganttTasks.filter(t=>t.id!==btn.dataset.ganttDel);
      } else {
        if(!confirm('Xóa công việc này khỏi Gantt?')) return;
        ganttTasks=ganttTasks.filter(t=>t.id!==btn.dataset.ganttDel);
      }
      ganttSave(); refreshGanttSection();
    };
  });

  // Chỉ cho kéo-thả ở tab Danh sách & Nhập liệu.
  // Tab Biểu đồ Gantt chỉ hiển thị theo đúng thứ tự của danh sách này.
  if(ganttActiveTab === 'list') attachGanttDragSort(section, '[data-gantt-row]');

  // Export
  const exportBtn = section.querySelector('#gantt-export-btn');
  if(exportBtn) exportBtn.onclick=exportGanttExcel;
  const exportBtn2 = section.querySelector('#gantt-export-btn2');
  if(exportBtn2) exportBtn2.onclick=exportGanttExcel;

  // Print
  const printBtn = section.querySelector('#gantt-print-btn');
  if(printBtn) printBtn.onclick=()=>{ if(window._printGanttChart) window._printGanttChart(); };

  // Clear all
  const clearBtn = section.querySelector('#gantt-clear-btn');
  if(clearBtn) clearBtn.onclick=()=>{
    if(!confirm('Xóa toàn bộ WBS, đơn vị thực hiện, tiến độ và ghi chú trong Gantt? Công việc liên kết từ dự án vẫn được giữ lại; ngày Gantt vẫn lấy từ kế hoạch/thực tế của danh sách công việc dự án.')) return;
    const project = projects.find(p => p.id === currentProjectId);
    const projectTaskById = new Map(((project && project.tasks) || []).map(pt => [pt.id, pt]));
    ganttTasks = ganttTasks.map(t => t.projectTaskId ? { ...t, wbs:'', unit:'', progress:defaultLinkedGanttProgress(projectTaskById.get(t.projectTaskId)), progressManual:false, notes:'' } : t).filter(t => !!t.projectTaskId);
    ganttSave(); refreshGanttSection();
  };
}

function refreshGanttSection(){
  const section = document.getElementById('gantt-section');
  if(!section) return;
  section.outerHTML = renderGanttTab();
  attachGanttEvents();
}

// --- Sync từ project tracker sang Gantt ---
// Gọi sau mỗi lần loadAll() hoặc khi currentProjectId thay đổi.
// Logic:
//   1. Công việc trong project nhưng chưa có trong ganttTasks → thêm mới, ngày lấy từ KH/TT, tiến độ mặc định theo trạng thái hoàn thành
//   2. Công việc đã có trong ganttTasks (match theo task.id lưu trong ganttTask.projectTaskId) → cập nhật tên nếu đổi
//   3. Công việc đã xóa khỏi project → xóa luôn khỏi ganttTasks
//   4. Công việc tự thêm thẳng vào Gantt (không có projectTaskId) → giữ nguyên
function syncGanttFromProject(){
  const project = projects.find(p => p.id === currentProjectId);
  if(!project) return; // không có project đang mở → không sync

  // Đổi dự án/tài khoản thì nạp bộ đệm đúng dự án trước.
  ganttLoad();

  const projectTasks = project.tasks || [];
  const projectSaved = readGanttProjectSyncFromText(project.funding_source || '') || {};
  if(projectSaved.name !== undefined) ganttProjectName = projectSaved.name || ganttProjectName || project.name || '';
  if(projectSaved.date !== undefined) ganttReportDate = projectSaved.date || ganttReportDate || '';
  if(Array.isArray(projectSaved.unlinked)){
    const localUnlinkedMap = new Map(ganttTasks.filter(t => !t.projectTaskId).map(t => [t.id, t]));
    projectSaved.unlinked.forEach(t => {
      if(!t || !t.id) return;
      const existing = localUnlinkedMap.get(t.id);
      if(existing){
        existing.wbs = t.wbs || '';
        existing.name = t.name || '';
        existing.start = t.start || '';
        existing.end = t.end || '';
        existing.progress = Math.min(100, Math.max(0, Number(t.progress) || 0));
        existing.unit = t.unit || '';
        existing.notes = t.notes || '';
        return;
      }
      ganttTasks.push({
        id: t.id || uid(),
        wbs: t.wbs || '',
        name: t.name || '',
        start: t.start || '',
        end: t.end || '',
        progress: Math.min(100, Math.max(0, Number(t.progress) || 0)),
        unit: t.unit || '',
        notes: t.notes || ''
      });
    });
  }

  // Set id của project tasks hiện tại
  const projectTaskIds = new Set(projectTasks.map(t => t.id));

  // Xóa ganttTask đã link nhưng project task không còn tồn tại
  ganttTasks = ganttTasks.filter(gt => !gt.projectTaskId || projectTaskIds.has(gt.projectTaskId));

  // Xây map sau khi đã lọc
  const linkedMap = {};
  ganttTasks.forEach(gt => { if(gt.projectTaskId) linkedMap[gt.projectTaskId] = gt; });

  // Cập nhật/khôi phục dữ liệu Gantt đã lưu ẩn trong Supabase notes
  projectTasks.forEach((pt, idx) => {
    const saved = readGanttSyncFromNotes(pt.notes || '') || {};
    const schedule = getTaskGanttSchedule(pt);
    if(linkedMap[pt.id]){
      const gt = linkedMap[pt.id];
      const progressManual = !!gt.progressManual || isSavedGanttProgressManual(pt, saved);
      gt.name = pt.name;
      if(saved.wbs !== undefined) gt.wbs = saved.wbs || '';
      gt.start = schedule.start || '';
      gt.end = schedule.end || '';
      gt.scheduleSource = schedule.source || '';
      gt.scheduleStartSource = schedule.startSource || '';
      gt.scheduleEndSource = schedule.endSource || '';
      gt.progress = resolveLinkedGanttProgress(pt, saved, gt);
      gt.progressManual = progressManual;
      if(saved.unit !== undefined) gt.unit = saved.unit || '';
      if(saved.notes !== undefined) gt.notes = saved.notes || '';
    }else{
      const progressManual = isSavedGanttProgressManual(pt, saved);
      ganttTasks.push({
        id: uid(),
        projectTaskId: pt.id,
        wbs: saved.wbs || '',
        name: pt.name,
        start: schedule.start || '',
        end: schedule.end || '',
        scheduleSource: schedule.source || '',
        scheduleStartSource: schedule.startSource || '',
        scheduleEndSource: schedule.endSource || '',
        progress: resolveLinkedGanttProgress(pt, saved, null),
        progressManual,
        unit: saved.unit || '',
        notes: saved.notes || ''
      });
    }
  });

  // Sắp xếp lại theo thứ tự Gantt đã lưu. Nếu chưa có thứ tự riêng, dùng thứ tự danh sách công việc dự án.
  applySavedGanttOrder(projectSaved.order, projectTasks);

  // Tự động đồng bộ meta: tên dự án nếu chưa có
  if(!ganttProjectName && project.name) ganttProjectName = project.name;

  // Chỉ ghi local để tránh sync vừa load đã ghi đè dữ liệu notes.
  try{
    localStorage.setItem(ganttStorageKey(), JSON.stringify(ganttTasks));
    localStorage.setItem(ganttMetaKey(), JSON.stringify({ name: ganttProjectName, date: ganttReportDate }));
  }catch(e){}
}

// ─── In biểu đồ Gantt ───────────────────────────────────────────────────────
function buildFullSVG(showUnit=true){
  // Xây SVG đơn khổ đầy đủ (dùng riêng cho in — luôn nền trắng)
  const validTasks = ganttTasks.filter(t=>t.start&&t.end);
  if(!validTasks.length) return null;

  const minDate = new Date(Math.min(...validTasks.map(t=>new Date(t.start))));
  const maxDate = new Date(Math.max(...validTasks.map(t=>new Date(t.end))));
  const totalDays = daysBetween(minDate.toISOString(), maxDate.toISOString()) + 1;
  const today = new Date(); today.setHours(0,0,0,0);

  // Tự điều chỉnh COL_W theo số ngày để vừa trang A3 ngang
  const COL_W   = totalDays<=62?22 : totalDays<=93?16 : totalDays<=186?11 : totalDays<=365?7 : 5;
  const ROW_H   = 26;
  const TASK_LABEL_W = 250;
  const UNIT_LABEL_W = showUnit ? 135 : 0;
  const LABEL_W = TASK_LABEL_W + UNIT_LABEL_W;
  const HEADER_H= 52;

  const chartW = LABEL_W + totalDays * COL_W;
  const chartH = HEADER_H + ganttTasks.length * ROW_H + 2;

  // Month groups
  const months=[];
  let cM=null,cC=0,cS=0;
  for(let i=0;i<totalDays;i++){
    const d=addDays(minDate,i); const mk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    if(mk!==cM){if(cM!==null)months.push({label:cM,count:cC,start:cS});cM=mk;cC=1;cS=i;}else cC++;
  }
  if(cM) months.push({label:cM,count:cC,start:cS});
  const fmtM=(key)=>{ const[y,m]=key.split('-');return new Date(y,m-1).toLocaleDateString('vi-VN',{month:'short',year:'numeric'}); };

  const todayOff=today>=minDate&&today<=maxDate?daysBetween(minDate.toISOString(),today.toISOString()):-1;
  const FONT = `font-family="Arial,Helvetica,sans-serif"`;

  let s=`<svg xmlns="http://www.w3.org/2000/svg" width="${chartW}" height="${chartH}">`;
  // Backgrounds
  s+=`<rect width="${chartW}" height="${chartH}" fill="#fff"/>`;
  s+=`<rect x="0" y="0" width="${LABEL_W}" height="${chartH}" fill="#f2f6f9"/>`;
  s+=`<rect x="0" y="0" width="${LABEL_W}" height="26" fill="#1f4f67"/>`;
  s+=`<text x="${showUnit ? TASK_LABEL_W/2 : LABEL_W/2}" y="17" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff" ${FONT}>Nội dung công việc</text>`;
  if(showUnit){
    s+=`<line x1="${TASK_LABEL_W}" y1="0" x2="${TASK_LABEL_W}" y2="${chartH}" stroke="rgba(0,0,0,0.14)" stroke-width="1"/>`;
    s+=`<text x="${TASK_LABEL_W+UNIT_LABEL_W/2}" y="17" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff" ${FONT}>Đơn vị thực hiện</text>`;
  }

  // Month headers
  months.forEach(m=>{
    const x=LABEL_W+m.start*COL_W, w=m.count*COL_W;
    s+=`<rect x="${x}" y="0" width="${w}" height="26" fill="#1f4f67"/>`;
    s+=`<text x="${x+w/2}" y="17" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff" ${FONT}>${fmtM(m.label)}</text>`;
    s+=`<line x1="${x}" y1="0" x2="${x}" y2="${chartH}" stroke="rgba(0,0,0,0.09)" stroke-width="0.8"/>`;
  });

  // Day numbers
  for(let i=0;i<totalDays;i++){
    const d=addDays(minDate,i); const x=LABEL_W+i*COL_W;
    const isWE=d.getDay()===0||d.getDay()===6;
    if(isWE) s+=`<rect x="${x}" y="26" width="${COL_W}" height="26" fill="rgba(0,0,0,0.04)"/>`;
    s+=`<text x="${x+COL_W/2}" y="42" text-anchor="middle" font-size="8" fill="${isWE?'#999':'#666'}" ${FONT}>${d.getDate()}</text>`;
  }
  s+=`<line x1="0" y1="${HEADER_H}" x2="${chartW}" y2="${HEADER_H}" stroke="rgba(0,0,0,0.18)" stroke-width="1.2"/>`;

  // Row lines + alternating + labels + bars
  ganttTasks.forEach((t,idx)=>{
    const y=HEADER_H+idx*ROW_H;
    if(idx%2===0) s+=`<rect x="0" y="${y}" width="${chartW}" height="${ROW_H}" fill="rgba(0,0,0,0.018)"/>`;
    s+=`<line x1="0" y1="${y+ROW_H}" x2="${chartW}" y2="${y+ROW_H}" stroke="rgba(0,0,0,0.08)" stroke-width="0.7"/>`;

    // Weekend column shading
    for(let i=0;i<totalDays;i++){
      const d=addDays(minDate,i);
      if(d.getDay()===0||d.getDay()===6)
        s+=`<rect x="${LABEL_W+i*COL_W}" y="${y}" width="${COL_W}" height="${ROW_H}" fill="rgba(0,0,0,0.028)"/>`;
    }

    const isBold=!t.start||!t.end||(t.wbs&&t.wbs.split('.').length<=1);
    const label=((t.wbs?t.wbs+' ':'')+t.name).slice(0,showUnit?36:48);
    const unit=ganttUnit(t).slice(0,24);
    s+=`<text x="8" y="${y+ROW_H/2+4}" text-anchor="start" font-size="${isBold?11:10}" font-weight="${isBold?'bold':'normal'}" fill="#1a2a35" ${FONT}>${escapeHtml(label)}</text>`;
    if(showUnit){
      s+=`<text x="${TASK_LABEL_W+8}" y="${y+ROW_H/2+4}" text-anchor="start" font-size="9.5" fill="#465866" ${FONT}>${unit ? escapeHtml(unit) : '-'}</text>`;
    }

    if(t.start&&t.end){
      const sD=new Date(t.start);sD.setHours(0,0,0,0);
      const eD=new Date(t.end);  eD.setHours(0,0,0,0);
      const bS=Math.max(0,daysBetween(minDate.toISOString(),sD.toISOString()));
      const bL=daysBetween(sD.toISOString(),eD.toISOString())+1;
      const bX=LABEL_W+bS*COL_W; const bW=Math.max(bL*COL_W,COL_W);
      const barH=16; const bY=y+(ROW_H-barH)/2;
      const bc=ganttBarColor(t); const prog=Number(t.progress)||0;
      s+=`<rect x="${bX}" y="${bY}" width="${bW}" height="${barH}" fill="${bc}" opacity="0.18" rx="3"/>`;
      if(prog>0){ const pW=Math.min(bW*prog/100,bW); s+=`<rect x="${bX}" y="${bY}" width="${pW}" height="${barH}" fill="${bc}" rx="3"/>`; }
      s+=`<rect x="${bX}" y="${bY}" width="${bW}" height="${barH}" fill="none" stroke="${bc}" stroke-width="1.2" rx="3"/>`;
      if(bW>30){ s+=`<text x="${bX+bW/2}" y="${bY+barH/2+3.5}" text-anchor="middle" font-size="8" font-weight="bold" fill="${prog>50?'#fff':bc}" ${FONT}>${prog}%</text>`; }
    }
  });

  // Vertical week/month separators (chart area only)
  for(let i=0;i<totalDays;i++){
    const d=addDays(minDate,i);
    if(d.getDay()===1||d.getDate()===1)
      s+=`<line x1="${LABEL_W+i*COL_W}" y1="${HEADER_H}" x2="${LABEL_W+i*COL_W}" y2="${chartH}" stroke="rgba(0,0,0,0.07)" stroke-width="0.8"/>`;
  }

  // Today line
  if(todayOff>=0){
    const tx=LABEL_W+todayOff*COL_W+COL_W/2;
    s+=`<line x1="${tx}" y1="0" x2="${tx}" y2="${chartH}" stroke="#c0392b" stroke-width="1.8" stroke-dasharray="4,3"/>`;
    s+=`<text x="${tx+3}" y="13" font-size="8" fill="#c0392b" font-weight="bold" ${FONT}>Hôm nay</text>`;
  }

  // Label border
  s+=`<line x1="${LABEL_W}" y1="0" x2="${LABEL_W}" y2="${chartH}" stroke="rgba(0,0,0,0.18)" stroke-width="1.5"/>`;
  s+=`</svg>`;
  return { svgStr:s, chartW, chartH };
}

function printGanttChart(){
  const validTasks=ganttTasks.filter(t=>t.start&&t.end);
  if(!validTasks.length){ alert('Chưa có công việc nào có ngày bắt đầu/kết thúc.\nHãy điền ngày cho các công việc rồi thử lại.'); return; }

  const unitToggle = document.getElementById('gantt-print-unit-toggle');
  const showUnit = !unitToggle || unitToggle.checked;
  const res=buildFullSVG(showUnit); if(!res) return;
  const {svgStr, chartW}=res;
  const projName = ganttProjectName||'Biểu đồ Gantt';
  const repDate  = ganttReportDate ? new Date(ganttReportDate).toLocaleDateString('vi-VN') : new Date().toLocaleDateString('vi-VN');
  const printedAt= new Date().toLocaleString('vi-VN');
  const st = ganttStats();

  const legendItems=[
    {color:'#3d8b72',label:'Hoàn thành (100%)'},
    {color:'#b98338',label:'Đang thực hiện'},
    {color:'#c75b4b',label:'Trễ hạn'},
    {color:'#2f6b8a',label:'Chưa bắt đầu'},
  ];
  const legendSVG=`<svg xmlns="http://www.w3.org/2000/svg" width="${Math.max(chartW,600)}" height="22" style="display:block;margin-top:5px;">
    ${legendItems.map((l,i)=>`<rect x="${i*155+4}" y="5" width="16" height="10" fill="${l.color}" rx="2"/><text x="${i*155+24}" y="15" font-size="9" font-family="Arial,sans-serif" fill="#444">${l.label}</text>`).join('')}
    <line x1="${legendItems.length*155+4}" y1="5" x2="${legendItems.length*155+4}" y2="15" stroke="#c0392b" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="${legendItems.length*155+10}" y="15" font-size="9" font-family="Arial,sans-serif" fill="#444">Ngày hôm nay</text>
  </svg>`;

  const frame=document.getElementById('gantt-print-frame');
  frame.innerHTML=`
  <style>
    @page { size:A3 landscape; margin:8mm 6mm; }
    @media print {
      *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
      html,body{background:#fff!important;margin:0!important;padding:0!important;}
      body>*{display:none!important;}
      #gantt-print-frame{display:block!important;background:#fff!important;color:#111!important;min-height:auto!important;}
    }
    #gantt-print-frame{background:#fff!important;}
    .gp{font-family:Arial,Helvetica,sans-serif;background:#fff!important;padding:4mm 2mm;margin:0;}
    .gp-hd{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:6px;margin-bottom:6px;border-bottom:2.5px solid #1f4f67;}
    .gp-title{font-size:16px;font-weight:bold;color:#1f4f67;margin:0 0 2px;}
    .gp-sub{font-size:10px;color:#555;margin:1px 0;}
    .gp-right{font-size:10px;color:#777;text-align:right;line-height:1.7;}
    .gp-stats{display:flex;gap:12px;margin-bottom:8px;}
    .gp-stat{background:#f0f5f8;border-radius:6px;padding:4px 12px;font-size:10px;text-align:center;}
    .gp-stat b{display:block;font-size:15px;margin-bottom:1px;}
    .gp-foot{margin-top:5px;font-size:8px;color:#bbb;text-align:right;border-top:1px solid #eee;padding-top:3px;}
    .gp-chart{overflow:visible;}
  
</style>
  <div class="gp">
    <div class="gp-hd">
      <div>
        <p class="gp-title">📊 BÁO CÁO TIẾN ĐỘ DỰ ÁN — BIỂU ĐỒ GANTT</p>
        <p class="gp-sub">Dự án / Công trình: <b>${escapeHtml(projName)}</b></p>
        <p class="gp-sub">Ngày báo cáo: <b>${repDate}</b></p>
      </div>
      <div class="gp-right">In lúc: ${printedAt}<br/>Tổng số công việc: <b>${st.total}</b></div>
    </div>
    <div class="gp-stats">
      <div class="gp-stat"><b style="color:#3d8b72">${st.done}</b>Hoàn thành</div>
      <div class="gp-stat"><b style="color:#b98338">${st.ongoing}</b>Đang thực hiện</div>
      <div class="gp-stat"><b style="color:#c75b4b">${st.late}</b>Trễ hạn</div>
      <div class="gp-stat"><b style="color:${st.delayDays>0?'#c75b4b':'#3d8b72'}">${st.delayDays} ngày</b>Trễ ước tính</div>
    </div>
    <div class="gp-chart">${svgStr}</div>
    ${legendSVG}
    <div class="gp-foot">Tài liệu tạo tự động từ hệ thống quản lý dự án xây dựng · ${printedAt}</div>
  </div>`;

  setTimeout(()=>{
    window.print();
    setTimeout(()=>{ frame.innerHTML=''; }, 1500);
  }, 150);
}

window._printGanttChart = printGanttChart;

// Expose for render()
window._renderGanttTab = renderGanttTab;
window._attachGanttEvents = attachGanttEvents;
window._syncGanttFromProject = syncGanttFromProject;
window._clearGanttProgressOverride = clearGanttProgressOverride;

})(); // end IIFE

// ==================== END GANTT MODULE ====================

render();
init();
// Không tự tải lại dữ liệu theo chu kỳ, tránh làm mất nội dung người dùng đang nhập.
// Người dùng vẫn có thể bấm nút 'Làm mới' khi cần đồng bộ thủ công.
setInterval(()=>{ if(currentProjectId && !isUserEditing() && !saving) render(); }, 60000);
</script>
