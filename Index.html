<style>
  :root {
    --arch-bg-light: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&fm=jpg&q=72&w=3000');
    --arch-bg-dark: url('https://images.unsplash.com/photo-1460317442991-0ec209397118?auto=format&fit=crop&fm=jpg&q=72&w=3000');
  }

  .brand-signature {
    display: inline-block;
    font-size: 24px;
    font-weight: 850;
    letter-spacing: 0.08em;
    line-height: 1.15;
    text-transform: uppercase;
    background: linear-gradient(90deg, #1f4f67, #b58a4a, #2f6b8a, #1f4f67);
    background-size: 260% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 8px 26px rgba(47, 107, 138, 0.18);
    animation: architecturalBrandFlow 6s ease-in-out infinite, architecturalBrandFloat 4.5s ease-in-out infinite;
  }

  .brand-signature::after {
    content: "";
    display: block;
    width: 72%;
    height: 2px;
    margin: 7px auto 0;
    border-radius: 999px;
    background: linear-gradient(90deg, transparent, rgba(181, 138, 74, 0.85), transparent);
    animation: architecturalLineSweep 3.6s ease-in-out infinite;
  }

  @keyframes architecturalBrandFlow {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  @keyframes architecturalBrandFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }

  @keyframes architecturalLineSweep {
    0%, 100% { opacity: 0.35; transform: scaleX(0.72); }
    50% { opacity: 1; transform: scaleX(1); }
  }

  @media (prefers-reduced-motion: reduce) {
    .brand-signature,
    .brand-signature::after {
      animation: none;
    }
  }

  /* ===== GANTT STICKY FREEZE ===== */
  .gantt-scroll-wrap {
    overflow: auto;
    max-height: 600px;
    border-radius: 0 0 16px 16px;
    position: relative;
  }
  .gantt-table {
    border-collapse: separate;
    border-spacing: 0;
    table-layout: fixed;
  }
  /* Frozen header row: bám trên khi cuộn dọc */
  .gantt-th-month,
  .gantt-th-day,
  .gantt-th-corner {
    position: sticky;
    z-index: 3;
  }
  .gantt-th-month  { top: 0; }
  .gantt-th-day    { top: 26px; }
  .gantt-th-corner { top: 0; left: 0; z-index: 5; }
  /* Frozen label column: bám trái khi cuộn ngang */
  .gantt-td-label {
    position: sticky;
    left: 0;
    z-index: 2;
  }

  /* ===== PRINT STYLES ===== */
  @media print {
    html, body {
      background: #fff !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    body > * { display: none !important; }
    #gantt-print-frame {
      display: block !important;
      background: #fff !important;
      color: #111 !important;
      min-height: auto !important;
    }
  }
  #gantt-print-frame { display: none; }

  [data-theme="dark"] .brand-signature {
    background: linear-gradient(90deg, #f6d27a, #8fc7ff, #f6d27a);
    background-size: 220% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow:
      0 0 18px rgba(143, 199, 255, 0.18),
      0 0 28px rgba(246, 210, 122, 0.12);
  }

  [data-theme="dark"] .brand-signature-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    max-width: 100%;
    white-space: nowrap;
    padding: 8px 4px 10px;
  }

  /* ===== DRAG & DROP SORTING ===== */
  [draggable="true"] {
    user-select: none;
  }
  .drag-sort-ghost {
    opacity: 0.45;
  }
  .drag-sort-over {
    outline: 2px dashed rgba(47, 107, 138, 0.55);
    outline-offset: -3px;
    background: rgba(47, 107, 138, 0.08) !important;
  }


  /* ===== PROJECT DETAIL LAYOUT ===== */
  .project-detail-shell {
    display: grid;
    grid-template-columns: minmax(190px, 232px) minmax(0, 1fr);
    gap: 18px;
    align-items: start;
  }
  .project-stat-rail {
    border-radius: 16px;
    padding: 14px 16px;
    position: sticky;
    top: 94px;
    align-self: start;
    z-index: 12;
    max-height: calc(100vh - 112px);
    overflow: auto;
    overscroll-behavior: contain;
    transform: none !important;
    will-change: top;
  }
  .project-stat-rail,
  .task-list-glass,
  .task-filter-glass {
    color: var(--project-readable-text, #10213c);
  }
  .project-stat-label,
  .task-muted-text {
    color: var(--project-readable-muted, #26384d) !important;
    text-shadow: 0 1px 1px rgba(255,255,255,0.35);
  }
  .project-stat-label {
    color: var(--project-readable-text, #10213c) !important;
    font-weight: 880 !important;
    text-shadow: 0 1px 2px rgba(255,255,255,0.62), 0 0 12px rgba(255,255,255,0.28);
  }
  .task-title-text {
    color: var(--project-readable-text, #10213c) !important;
    font-weight: 720;
    text-shadow: 0 1px 1px rgba(255,255,255,0.35);
  }
  .dashboard-content {
    color: var(--project-readable-text, #10213c);
  }
  .dashboard-content h1,
  .dashboard-content h2,
  .dashboard-content h3,
  .dashboard-content h4 {
    color: var(--project-readable-text, #10213c);
    font-weight: 820;
    text-shadow: 0 1px 2px rgba(255,255,255,0.58);
  }
  .dashboard-content input,
  .dashboard-content textarea,
  .dashboard-content select {
    color: var(--project-readable-text, #10213c) !important;
    font-weight: 650;
    text-shadow: none;
  }
  .dashboard-content input::placeholder,
  .dashboard-content textarea::placeholder {
    color: var(--field-placeholder, #43546a) !important;
    opacity: 1;
    font-weight: 650;
  }
  .dashboard-content label,
  .dashboard-content p,
  .dashboard-content small {
    text-shadow: 0 1px 1px rgba(255,255,255,0.34);
  }
  .task-filter-glass {
    background: var(--project-filter-bg, rgba(248,252,255,0.78));
    border: 1px solid var(--project-filter-border, rgba(255,255,255,0.70));
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 12px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.78),
      0 16px 40px rgba(18,52,88,0.16);
    backdrop-filter: blur(24px) saturate(205%) contrast(108%);
    -webkit-backdrop-filter: blur(24px) saturate(205%) contrast(108%);
    contain: paint;
    transform: translateZ(0);
  }
  .task-list-glass {
    contain: layout paint;
    transform: translateZ(0);
    backdrop-filter: blur(18px) saturate(175%) contrast(105%) !important;
    -webkit-backdrop-filter: blur(18px) saturate(175%) contrast(105%) !important;
  }
  .task-row-virtual {
    contain: layout paint;
  }
  @supports (content-visibility: auto) {
    .task-row-virtual {
      content-visibility: auto;
      contain-intrinsic-size: 74px;
    }
    .task-row-virtual.is-expanded {
      contain-intrinsic-size: 380px;
    }
  }
  .task-filter-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 0 0 12px;
  }
  [data-theme="dark"] .project-stat-label,
  [data-theme="dark"] .task-muted-text {
    text-shadow: 0 1px 2px rgba(0,0,0,0.42);
  }
  [data-theme="dark"] .dashboard-content h1,
  [data-theme="dark"] .dashboard-content h2,
  [data-theme="dark"] .dashboard-content h3,
  [data-theme="dark"] .dashboard-content h4,
  [data-theme="dark"] .dashboard-content label,
  [data-theme="dark"] .dashboard-content p,
  [data-theme="dark"] .dashboard-content small {
    text-shadow: 0 1px 2px rgba(0,0,0,0.56);
  }
  [data-theme="dark"] .project-stat-label {

// ============ HIDDEN GANTT SYNC HELPERS ============
// Lưu dữ liệu Gantt ẩn trong cột notes của từng công việc để đồng bộ qua Supabase.
// Phần kỹ thuật này sẽ được ẩn khỏi ô ghi chú người dùng.
const GANTT_SYNC_PREFIX = '[[__GANTT_SYNC__:';
const GANTT_SYNC_SUFFIX = ':__GANTT_SYNC__]]';
const GANTT_SYNC_REGEX = /(?:\n?\n?)\[\[__GANTT_SYNC__:[A-Za-z0-9+/=]+:__GANTT_SYNC__\]\]/g;
function encodeGanttPayload(obj){
  try{ return btoa(unescape(encodeURIComponent(JSON.stringify(obj || {})))); }
  catch(e){ return ''; }
}
function decodeGanttPayload(raw){
  try{ return JSON.parse(decodeURIComponent(escape(atob(raw)))); }
  catch(e){ return null; }
}
function stripGanttSyncFromNotes(notes){
  return String(notes || '').replace(GANTT_SYNC_REGEX, '').trimEnd();
}
function readGanttSyncFromNotes(notes){
  const m = String(notes || '').match(/\[\[__GANTT_SYNC__:([A-Za-z0-9+/=]+):__GANTT_SYNC__\]\]/);
  return m ? decodeGanttPayload(m[1]) : null;
}
function setGanttSyncInNotes(userNotes, payload){
  const clean = stripGanttSyncFromNotes(userNotes || '');
  const encoded = encodeGanttPayload(payload || {});
  if(!encoded) return clean;
  return clean + '\n\n' + GANTT_SYNC_PREFIX + encoded + GANTT_SYNC_SUFFIX;
}
function preserveGanttSyncInNotes(userNotes, oldFullNotes){
  const oldPayload = readGanttSyncFromNotes(oldFullNotes || '');
  return oldPayload ? setGanttSyncInNotes(userNotes, oldPayload) : String(userNotes || '');
}


const TASK_EXT_PREFIX = '[[__TASK_EXT_SYNC__:';
const TASK_EXT_SUFFIX = ':__TASK_EXT_SYNC__]]';
const TASK_EXT_REGEX = /(?:\n?\n?)\[\[__TASK_EXT_SYNC__:[A-Za-z0-9+/=]+:__TASK_EXT_SYNC__\]\]/g;
function stripTaskExtFromNotes(notes){
  return String(notes || '').replace(TASK_EXT_REGEX, '').trimEnd();
}
function readTaskExtFromNotes(notes){
  const m = String(notes || '').match(/\[\[__TASK_EXT_SYNC__:([A-Za-z0-9+/=]+):__TASK_EXT_SYNC__\]\]/);
  return m ? (decodeGanttPayload(m[1]) || {}) : {};
}
function setTaskExtInNotes(notes, payload){
  const clean = stripTaskExtFromNotes(notes || '');
  const normalized = normalizeTaskExtPayload(payload || {});
  const hasData = Object.values(normalized).some(v => String(v || '').trim() !== '');
  if(!hasData) return clean;
  const encoded = encodeGanttPayload(normalized);
  if(!encoded) return clean;
  return clean + '\n\n' + TASK_EXT_PREFIX + encoded + TASK_EXT_SUFFIX;
}
function stripInternalTaskNotes(notes){
  return stripTaskExtFromNotes(stripGanttSyncFromNotes(notes || '')).trimEnd();
}
function mergeTaskInternalInNotes(userNotes, oldFullNotes){
  let next = String(userNotes || '');
  const ext = readTaskExtFromNotes(oldFullNotes || '');
  if(ext && Object.keys(ext).length) next = setTaskExtInNotes(next, ext);
  const ganttPayload = readGanttSyncFromNotes(oldFullNotes || '');
  if(ganttPayload) next = setGanttSyncInNotes(next, ganttPayload);
  return next;
}
function normalizeDateOnly(value){
  if(!value) return '';
  const raw = String(value).trim();
  const m = raw.match(/^(\d{4}-\d{2}-\d{2})/);
  if(m) return m[1];
  const d = new Date(raw);
  if(!Number.isFinite(d.getTime())) return '';
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function normalizeTaskExtPayload(payload){
  const p = payload || {};
  const rawDepends = Array.isArray(p.depends_on)
    ? p.depends_on
    : (p.depends_on ? String(p.depends_on).split(',') : []);
  const depends_on = [...new Set(rawDepends.map(x => String(x || '').trim()).filter(Boolean))];
  return {
    plan_start: normalizeDateOnly(p.plan_start),
    plan_end: normalizeDateOnly(p.plan_end),
    actual_start: normalizeDateOnly(p.actual_start),
    actual_end: normalizeDateOnly(p.actual_end),
    depends_on
  };
}
function getTaskExt(t){
  return normalizeTaskExtPayload(readTaskExtFromNotes(t && t.notes ? t.notes : ''));
}
function getProjectForTask(t){
  if(!t) return null;
  return projects.find(p => (p.tasks || []).some(x => x.id === t.id)) || null;
}
function getDependencyInfo(t){
  const ext = getTaskExt(t);
  const p = getProjectForTask(t);
  const ids = (ext.depends_on || []).filter(id => id && id !== (t && t.id));
  const deps = ids.map(id => (p && p.tasks ? p.tasks : []).find(x => x.id === id)).filter(Boolean);
  const unfinished = deps.filter(d => !d.done);
  return { ids, deps, unfinished, blocked: unfinished.length > 0 };
}
function localDateMs(value){
  const d = normalizeDateOnly(value);
  if(!d) return NaN;
  return new Date(d + 'T00:00:00').getTime();
}
function todayDateOnly(){
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function dateDiffDays(fromDate, toDate){
  const a = localDateMs(fromDate);
  const b = localDateMs(toDate);
  if(!Number.isFinite(a) || !Number.isFinite(b)) return 0;
  return Math.ceil((b - a) / (24*60*60*1000));
}
function formatDateOnly(value){
  const d = normalizeDateOnly(value);
  if(!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}
function getPlanComparison(t){
  const ext = getTaskExt(t);
  const hasPlanStart = !!ext.plan_start;
  const hasPlanEnd = !!ext.plan_end;
  const hasActualStart = !!ext.actual_start;
  const hasActualEnd = !!ext.actual_end;
  const missingPlan = !hasPlanStart || !hasPlanEnd;
  let delayDays = 0;
  let earlyDays = 0;
  let status = missingPlan ? 'Chưa nhập đủ kế hoạch' : 'Đúng kế hoạch';
  let colorType = missingPlan ? 'missing' : 'ok';
  let isLate = false;
  let isEarly = false;

  if(hasPlanEnd){
    if(hasActualEnd){
      const diff = dateDiffDays(ext.plan_end, ext.actual_end);
      if(diff > 0){ delayDays = diff; isLate = true; colorType = 'late'; status = `Chậm ${diff} ngày so với kế hoạch`; }
      else if(diff < 0){ earlyDays = Math.abs(diff); isEarly = true; colorType = 'early'; status = `Sớm ${earlyDays} ngày so với kế hoạch`; }
      else { status = 'Hoàn thành đúng ngày kế hoạch'; colorType = 'ok'; }
    }else if(!t.done){
      const diff = dateDiffDays(ext.plan_end, todayDateOnly());
      if(diff > 0){ delayDays = diff; isLate = true; colorType = 'late'; status = `Đang chậm ${diff} ngày so với kế hoạch`; }
      else { status = 'Đang trong thời gian kế hoạch'; colorType = 'running'; }
    }else{
      status = 'Đã hoàn thành, chưa nhập ngày thực tế';
      colorType = 'missing';
    }
  }

  return { ...ext, missingPlan, hasActualStart, hasActualEnd, delayDays, earlyDays, isLate, isEarly, status, colorType };
}
function getTaskWarningFlags(t){
  const deadline = getDeadlineStatus(t);
  const plan = getPlanComparison(t);
  const deps = getDependencyInfo(t);
  return {
    overdue: !!deadline.overdue,
    dueSoon: !!deadline.dueSoon,
    latePlan: !!plan.isLate,
    missingPlan: !!plan.missingPlan,
    noDeadline: !t.deadline_at,
    dependencyBlocked: !!deps.blocked,
    hasAnyAlert: !!deadline.overdue || !!deadline.dueSoon || !!plan.isLate || !!deps.blocked
  };
}
function projectAlertSummary(p){
  const tasks = p && p.tasks ? p.tasks : [];
  const summary = { overdue:0, dueSoon:0, latePlan:0, missingPlan:0, noDeadline:0, dependencyBlocked:0, totalAlerts:0 };
  tasks.forEach(t=>{
    const f = getTaskWarningFlags(t);
    if(f.overdue) summary.overdue++;
    if(f.dueSoon) summary.dueSoon++;
    if(f.latePlan) summary.latePlan++;
    if(f.missingPlan) summary.missingPlan++;
    if(f.noDeadline) summary.noDeadline++;
    if(f.dependencyBlocked) summary.dependencyBlocked++;
  });
  summary.totalAlerts = summary.overdue + summary.dueSoon + summary.latePlan + summary.dependencyBlocked;
  return summary;
}
function projectDeadlineAlerts(p){ return projectAlertSummary(p).totalAlerts; }
function projectComparisonStats(p){
  const tasks = p && p.tasks ? p.tasks : [];
  const stats = { total:tasks.length, onTrack:0, late:0, early:0, missingPlan:0, missingActual:0 };
  tasks.forEach(t=>{
    const cmp = getPlanComparison(t);
    if(cmp.missingPlan) stats.missingPlan++;
    else if(cmp.isLate) stats.late++;
    else if(cmp.isEarly) stats.early++;
    else stats.onTrack++;
    if(t.done && !cmp.actual_end) stats.missingActual++;
  });
  return stats;
}
function taskMatchesProjectFilter(t, filter){
  const f = filter || 'all';
  const flags = getTaskWarningFlags(t);
  const cmp = getPlanComparison(t);
  if(f === 'all') return true;
  if(f === 'pending') return !t.done;
  if(f === 'completed') return !!t.done;
  if(f === 'overdue') return flags.overdue;
  if(f === 'due_soon') return flags.dueSoon;
  if(f === 'late_plan') return flags.latePlan;
  if(f === 'missing_plan') return flags.missingPlan;
  if(f === 'dependency_blocked') return flags.dependencyBlocked;
  if(f === 'no_deadline') return flags.noDeadline;
  if(f === 'in_progress') return !t.done && !!cmp.actual_start;
  if(f === 'not_started') return !t.done && !cmp.actual_start;
  return true;
}
function projectFilterDefinitions(project){
  const tasks = project && project.tasks ? project.tasks : [];
  const count = filter => tasks.filter(t => taskMatchesProjectFilter(t, filter)).length;
  return [
    ['all','Tất cả',tasks.length,'list-details'],
    ['pending','Chưa xong',count('pending'),'clock-hour-4'],
    ['completed','Hoàn thành',count('completed'),'circle-check'],
    ['overdue','Quá hạn',count('overdue'),'alert-triangle'],
    ['due_soon','Sắp đến hạn',count('due_soon'),'bell-ringing'],
    ['late_plan','Chậm KH',count('late_plan'),'calendar-exclamation'],
    ['dependency_blocked','Phụ thuộc chưa xong',count('dependency_blocked'),'git-branch'],
    ['missing_plan','Thiếu KH',count('missing_plan'),'calendar-question'],
    ['no_deadline','Chưa có hạn',count('no_deadline'),'calendar-off']
  ];
}
async function updateTaskExt(taskId, changes){
  let task = null;
  for(const p of projects){
    task = (p.tasks || []).find(x => x.id === taskId);
    if(task) break;
  }
  if(!task) return;
  const current = getTaskExt(task);
  const nextPayload = normalizeTaskExtPayload({ ...current, ...changes });
  let nextNotes = setTaskExtInNotes(task.notes || '', nextPayload);
  const ganttPayload = readGanttSyncFromNotes(task.notes || '');
  if(ganttPayload) nextNotes = setGanttSyncInNotes(nextNotes, ganttPayload);
  await updateTask(taskId, { notes: nextNotes });
  setTimeout(()=>{ if(currentProjectId) render(); }, 0);
}
function planBadgeHtml(c, cmp){

}
function renderAlertPanel(project, c){

  return `<div style="background:${c.card};border:1px solid ${c.red};border-radius:16px;padding:16px;margin-bottom:20px;${cardEffect()}"><h3 style="margin:0 0 10px;font-size:17px;font-weight:650;color:${c.red};"><i class="ti ti-bell-ringing" style="vertical-align:-2px;margin-right:6px;"></i>Cảnh báo cần xử lý</h3><div style="display:grid;gap:8px;">${alerts.slice(0,8).map(a=>`<div style="display:flex;gap:8px;align-items:flex-start;font-size:13px;color:${c.text};"><div style="display:flex;gap:5px;margin-top:2px;flex-shrink:0;">${a.items.slice(0,3).map(item=>`<i class="ti ti-${item.icon}" style="color:${item.color};"></i>`).join('')}</div><div><b>${escapeHtml(a.task.name)}</b><div style="display:grid;gap:3px;margin-top:4px;">${a.items.map(item=>`<span style="color:${item.color};display:flex;align-items:flex-start;gap:5px;"><i class="ti ti-${item.icon}" style="margin-top:1px;flex-shrink:0;"></i>${escapeHtml(item.text)}</span>`).join('')}</div></div></div>`).join('')}${alerts.length>8?`<p style="margin:4px 0 0;color:${c.sub};font-size:12px;">Còn ${alerts.length-8} cảnh báo khác. Dùng bộ lọc nhanh để xem đầy đủ.</p>`:''}</div></div>`;
}

const GANTT_PROJECT_SYNC_PREFIX = '[[__GANTT_PROJECT_SYNC__:';

const GANTT_PROJECT_SYNC_REGEX = /(?:\n?\n?)\[\[__GANTT_PROJECT_SYNC__:[A-Za-z0-9+/=]+:__GANTT_PROJECT_SYNC__\]\]/g;

}
function readGanttProjectSyncFromText(text){

function setGanttProjectSyncInText(userText, payload){

function preserveGanttProjectSyncInText(userText, oldFullText){

function parseMoney(value){
  const raw = String(value ?? '').replace(/[^0-9.-]/g, '');
  const n = Number(raw);
  if(!Number.isFinite(n)) return 0;
  return Math.round(n);
}
function formatMoney(value){

}
function projectFunding(p){
  const total = parseMoney(p && p.total_budget);

  const remaining = total - disbursed;

}
function touchLocalProject(projectId, changes){

function scheduleProjectSave(projectId, changes){
  if(!currentUser || !db) return;
  const p = projects.find(x => x.id === projectId);
  if(!p || !isOwner(p)) return;
  projectSaveBuffers[projectId] = { ...(projectSaveBuffers[projectId] || {}), ...changes };
  clearTimeout(projectSaveTimers[projectId]);
  saving = true;
  statusOk = true;
  statusText = 'Đang tự động lưu...';
  renderSaveText();
  projectSaveTimers[projectId] = setTimeout(async ()=>{
    const payload = projectSaveBuffers[projectId] || {};
    delete projectSaveBuffers[projectId];
    try{
      const { error } = await db.from('projects').update({ ...payload, updated_at: nowIso() }).eq('id', projectId);
      if(error) throw error;
      statusOk = true;
      statusText = 'Đã tự động lưu.';
    }catch(e){
      console.error(e);
      statusOk = false;
      statusText = 'Không tự động lưu được thông tin nguồn vốn. Kiểm tra quyền hoặc kết nối.';

function initialsFromName(name, email){
  const raw = String(name || (email ? String(email).split('@')[0] : '') || 'U').trim();
  return (Array.from(raw)[0] || 'U').toUpperCase();
}
function currentOnlinePayload(){
  if(!currentUser) return null;
  return {
    id: currentUser.id,
    name: displayUserName(),
    email: userEmail(),
    initials: userInitial(),
    online_at: nowIso(),
    tab_id: sessionStorage.getItem('cpt-online-tab-id') || (()=>{ const id = 'tab-' + Math.random().toString(36).slice(2) + Date.now().toString(36); sessionStorage.setItem('cpt-online-tab-id', id); return id; })()
  };
}
function normalizeOnlineUsers(){
  const map = new Map();
  const fallback = currentOnlinePayload();
  const list = [...(Array.isArray(onlineUsers) ? onlineUsers : []), ...(fallback ? [fallback] : [])];
  list.forEach(u=>{
    if(!u) return;
    const key = String(u.id || u.email || u.name || '').trim();
    if(!key) return;
    const name = String(u.name || (u.email ? String(u.email).split('@')[0] : 'Người dùng')).trim() || 'Người dùng';
    const email = String(u.email || '').trim();
    const item = {
      id: key,
      name,
      email,
      initials: String(u.initials || initialsFromName(name, email)).slice(0,2).toUpperCase(),
      online_at: u.online_at || nowIso(),
      isMe: currentUser && (key === currentUser.id || email === userEmail())
    };
    const prev = map.get(key);
    if(!prev || item.isMe || String(item.online_at) > String(prev.online_at)) map.set(key, item);
  });
  return Array.from(map.values()).sort((a,b)=>{
    if(a.isMe && !b.isMe) return -1;
    if(!a.isMe && b.isMe) return 1;
    return a.name.localeCompare(b.name, 'vi');
  });
}

async function setupOnlinePresence(){
  if(!db || !currentUser) return;
  if(onlineChannel && onlineChannel._cptUserId === currentUser.id){
    try{ await onlineChannel.track(currentOnlinePayload()); }catch(e){ console.warn('Không cập nhật được trạng thái online:', e); }
    return;
  }
  await cleanupOnlinePresence();
  const channel = db.channel('duyvinh-build-online-users', { config: { presence: { key: currentUser.id } } });
  channel._cptUserId = currentUser.id;
  onlineChannel = channel;
  const syncPresence = ()=>{
    if(!onlineChannel) return;
    const state = onlineChannel.presenceState ? onlineChannel.presenceState() : {};
    const list = [];
    Object.keys(state || {}).forEach(key=>{
      (state[key] || []).forEach(item=> list.push(item));
    });
    onlineUsers = list;
    renderOnlineUsersWidget();
  };
  channel
    .on('presence', { event: 'sync' }, syncPresence)
    .on('presence', { event: 'join' }, syncPresence)
    .on('presence', { event: 'leave' }, syncPresence)
    .subscribe(async (status)=>{
      if(status === 'SUBSCRIBED'){
        try{ await channel.track(currentOnlinePayload()); }catch(e){ console.warn('Không gửi được trạng thái online:', e); }
        syncPresence();
      }
    });
}
async function cleanupOnlinePresence(){
  showOnlinePanel = false;
  onlineUsers = [];
  const channel = onlineChannel;
  onlineChannel = null;
  if(channel){
    try{ await channel.untrack(); }catch(e){}
    try{ if(db) await db.removeChannel(channel); }catch(e){}
  }
  renderOnlineUsersWidget();
}

});

async function init(){
  try{
    db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true } });
    const { data } = await db.auth.getSession();
    currentUser = data && data.session ? data.session.user : null;
    db.auth.onAuthStateChange(async (event, session)=>{
      const nextUser = session ? session.user : null;
      const sameUser = currentUser && nextUser && currentUser.id === nextUser.id;

      // Supabase có thể phát sự kiện TOKEN_REFRESHED/INITIAL_SESSION; không được tải lại giao diện khi người dùng đang thao tác.
      if(event === 'TOKEN_REFRESHED' || event === 'INITIAL_SESSION'){
        currentUser = nextUser || currentUser;
        return;
      }

      currentUser = nextUser;
      if(!currentUser){
        await cleanupOnlinePresence();
        currentProjectId = null;
        expandedTaskId = null;
        projects=[]; legacyData=null; loading=false; render();
        return;
      }

      if(!sameUser || event === 'SIGNED_IN'){
        currentProjectId = null;
        expandedTaskId = null;
        await setupOnlinePresence();
        await loadAll({showLoading:true});
      }
    });
    if(currentUser){ await setupOnlinePresence(); await loadAll({showLoading:true}); } else { loading=false; statusText='Vui lòng đăng nhập để xem dữ liệu nội bộ.'; render(); }
  }catch(e){ console.error(e); loading=false; setStatus(false, 'Không khởi tạo được Supabase. Kiểm tra URL/key hoặc kết nối mạng.'); }
}

async function loadAll(options = {}){
  if(!db || !currentUser) return;
  const showLoading = options.showLoading !== false;
  const skipWhenEditing = options.skipWhenEditing === true;

  // Không tự đồng bộ khi người dùng đang nhập liệu, để tránh mất dữ liệu đang gõ.
  if(skipWhenEditing && (isUserEditing() || saving)) return;

  if(showLoading){
    loading = true;
    render();
  }

  try{
    const { data, error } = await db
      .from('projects')
      .select('id,name,manager,owner_id,owner_email,funding_source,total_budget,disbursed_amount,created_at,updated_at,tasks(id,project_id,name,done,notes,deadline_at,sort_order,created_at,updated_at)')
      .order('created_at', { ascending:true });
    if(error) throw error;

    projects = (data || []).map(p => ({
      ...p,
      tasks: (p.tasks || []).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0) || new Date(a.created_at)-new Date(b.created_at))
    }));

    await checkLegacyData();
    loading = false;
    statusOk = true;
    statusText = showLoading ? 'Đã đồng bộ dữ liệu. Người khác chỉ được xem/copy, chỉ chủ dự án được sửa.' : 'Đã đồng bộ nền.';

    // Đồng bộ Gantt sau khi có dữ liệu mới nhất
    if(window._syncGanttFromProject) window._syncGanttFromProject();

    // Với đồng bộ nền, chỉ render khi người dùng không đang nhập liệu.
    if(showLoading || !isUserEditing()){
      render();
    }else{
      renderSaveText();
    }
  }catch(e){
    console.error(e);
    loading=false;
    if(showLoading){
      setStatus(false, 'Không tải được dữ liệu. Hãy kiểm tra đã chạy đúng file SQL và policy RLS chưa.');
    }else{
      statusOk = false;
      statusText = 'Tạm thời không đồng bộ nền được.';
      renderSaveText();
    }
  }
}

async function moveTask(projectId, taskId, dir){
  const p=projects.find(x=>x.id===projectId); if(!isOwner(p)) return;
  const tasks=[...(p.tasks||[])].sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  const idx=tasks.findIndex(t=>t.id===taskId); const newIdx=idx+dir;
  if(idx<0 || newIdx<0 || newIdx>=tasks.length) return;
  [tasks[idx], tasks[newIdx]] = [tasks[newIdx], tasks[idx]];
  saving=true; renderSaveText();
  try{
    for(let i=0;i<tasks.length;i++){
      const { error } = await db.from('tasks').update({ sort_order:(i+1)*10, updated_at:nowIso() }).eq('id', tasks[i].id);
      if(error) throw error;
    }
    await loadAll({showLoading:false});
  }catch(e){ console.error(e); setStatus(false, 'Không sắp xếp được công việc.'); }
  saving=false; renderSaveText();
}

async function reorderProjectTasks(projectId, orderedTaskIds){
  const p=projects.find(x=>x.id===projectId); if(!p || !isOwner(p)) return;
  const oldTasks=[...(p.tasks||[])].sort((a,b)=>(a.sort_order||0)-(b.sort_order||0) || new Date(a.created_at)-new Date(b.created_at));
  const map=new Map(oldTasks.map(t=>[t.id,t]));
  const ordered=[];
  (orderedTaskIds||[]).forEach(id=>{ if(map.has(id)) ordered.push(map.get(id)); });
  oldTasks.forEach(t=>{ if(!ordered.includes(t)) ordered.push(t); });
  p.tasks = ordered.map((t,i)=>({ ...t, sort_order:(i+1)*10, updated_at:nowIso() }));
  saving=true;
  statusOk=true;
  statusText='Đang lưu thứ tự công việc...';
  renderSaveText();

  try{
    const updates=p.tasks.map((t,i)=>db.from('tasks').update({ sort_order:(i+1)*10, updated_at:nowIso() }).eq('id', t.id));

    // Đồng bộ luôn thứ tự Gantt ẩn theo thứ tự danh sách công việc vừa kéo-thả.
    // Nếu không cập nhật đoạn này, biểu đồ Gantt có thể đọc lại order cũ và nhảy ngược.
    const savedGanttMeta = readGanttProjectSyncFromText(p.funding_source || '') || {};
    const savedOrder = Array.isArray(savedGanttMeta.order) ? savedGanttMeta.order.map(item => {
      if(typeof item === 'string') return item;
      if(item && item.projectTaskId) return `linked:${item.projectTaskId}`;
      if(item && item.type === 'linked' && item.id) return `linked:${item.id}`;
      if(item && item.type === 'unlinked' && item.id) return `unlinked:${item.id}`;
      if(item && item.id) return `unlinked:${item.id}`;
      return '';
    }).filter(Boolean) : [];
    const unlinkedOrder = savedOrder.filter(k => k.startsWith('unlinked:'));
    const nextGanttMeta = { ...savedGanttMeta, order: [...p.tasks.map(t => `linked:${t.id}`), ...unlinkedOrder] };
    const nextFundingSource = setGanttProjectSyncInText(p.funding_source || '', nextGanttMeta);
    if(nextFundingSource !== (p.funding_source || '')){
      touchLocalProject(projectId, { funding_source: nextFundingSource });
      updates.push(db.from('projects').update({ funding_source: nextFundingSource, updated_at:nowIso() }).eq('id', projectId));
    }

    const results=await Promise.all(updates);
    const err=results.find(r=>r && r.error);
    if(err) throw err.error;
    statusOk=true;
    statusText='Đã lưu thứ tự công việc.';
    if(window._syncGanttFromProject) window._syncGanttFromProject();
    render();
  }catch(e){
    console.error(e);
    statusOk=false;
    statusText='Không lưu được thứ tự công việc. Kiểm tra quyền sửa dự án hoặc kết nối.';
    renderSaveText();
  }
  saving=false;
  renderSaveText();
}

  rail.style.left = '';
  rail.style.width = '';
  rail.style.maxHeight = '';
  rail.style.overflowY = '';
  rail.style.overflowX = '';
  rail.style.zIndex = '';
  rail.style.boxSizing = '';
  rail.style.bottom = '';
  rail.style.right = '';
}
function updatePinnedStatRail(){
  const shell = document.querySelector('.project-detail-shell');
  const rail = document.querySelector('.project-stat-rail');
  if(!shell || !rail || window.innerWidth <= 980 || showGanttView || !currentProjectId){
    resetPinnedStatRail(rail);
    return;
  }

  const topbar = document.querySelector('.dashboard-topbar');
  const topOffset = Math.max(82, (topbar ? topbar.getBoundingClientRect().height : 76) + 18);
  const shellRect = shell.getBoundingClientRect();
  const shellTopAbs = window.scrollY + shellRect.top;
  const railNaturalTop = shellTopAbs;
  const railHeight = rail.offsetHeight;
  const shellHeight = shell.offsetHeight;
  const shellBottomAbs = shellTopAbs + shellHeight;
  const railWidth = Math.max(190, shellRect.width ? Math.min(232, rail.offsetWidth || 232) : 232);

  rail.style.boxSizing = 'border-box';
  rail.style.maxHeight = `calc(100vh - ${topOffset + 18}px)`;
  rail.style.overflowY = 'auto';
  rail.style.overflowX = 'hidden';
  rail.style.zIndex = '14';

  // 1) Chưa cuộn tới vùng cột Tổng quan: để nguyên trong layout, không che phần trên.
  if(window.scrollY + topOffset <= railNaturalTop){
    rail.style.position = 'relative';
    rail.style.top = 'auto';
    rail.style.left = 'auto';
    rail.style.width = 'auto';
    rail.style.bottom = '';
    rail.style.right = '';
    return;
  }

  // 2) Gần cuối vùng chi tiết dự án: dừng lại ở đáy vùng, không trôi xuống các phần khác.
  if(window.scrollY + topOffset + railHeight >= shellBottomAbs){
    rail.style.position = 'absolute';
    rail.style.top = Math.max(0, shellHeight - railHeight) + 'px';
    rail.style.left = '0px';
    rail.style.width = '232px';
    rail.style.bottom = '';
    rail.style.right = '';
    return;
  }

  // 3) Đang ở giữa vùng chi tiết dự án: ghim bên trái, nằm dưới topbar.
  rail.style.position = 'fixed';
  rail.style.top = topOffset + 'px';
  rail.style.left = shellRect.left + 'px';
  rail.style.width = '232px';
  rail.style.bottom = '';
  rail.style.right = '';
}
function schedulePinnedStatRailUpdate(){
  if(statRailPinRaf) return;
  statRailPinRaf = true;
  requestAnimationFrame(()=>{
    statRailPinRaf = false;
    updatePinnedStatRail();
  });
}
window.addEventListener('scroll', schedulePinnedStatRailUpdate, { passive:true });
window.addEventListener('resize', schedulePinnedStatRailUpdate);

          <button data-action="addproject" style="border:none; background:${c.accent}; color:#fff; font-size:14px; font-weight:700; padding:10px 18px; border-radius:10px; cursor:pointer; white-space:nowrap;"><i class="ti ti-plus" style="font-size:15px; vertical-align:-2px; margin-right:4px;"></i>Tạo dự án</button>
        </div>
        <div style="display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap;"><button data-action="filter" data-filter="all" style="border:1px solid ${c.border}; background:${filterMode==='all'?c.accent:c.card}; color:${filterMode==='all'?'#fff':c.text}; padding:8px 12px; border-radius:980px; cursor:pointer; font-size:13px; font-weight:700;">Tất cả dự án</button><button data-action="filter" data-filter="mine" style="border:1px solid ${c.border}; background:${filterMode==='mine'?c.accent:c.card}; color:${filterMode==='mine'?'#fff':c.text}; padding:8px 12px; border-radius:980px; cursor:pointer; font-size:13px; font-weight:700;">Dự án của tôi</button></div>` : ''}
        ${mainHtml}
      </section>
    </main>
  </div>`;
  attachEvents(project);
  if(project) drawCharts(project, c);
  if(showGanttView && window._attachGanttEvents) window._attachGanttEvents();
  renderSaveText();
  schedulePinnedStatRailUpdate();
}

function statusHtml(c){ const color = statusOk ? c.green : c.red; const icon = statusOk ? 'cloud-check' : 'cloud-x'; return `<div style="background:${c.card}; border:1px solid ${c.border}; color:${c.text}; font-size:12px; padding:10px 14px; border-radius:12px; margin-bottom:14px; display:flex; gap:8px; align-items:center; justify-content:space-between; ${cardEffect()}"><span style="display:flex; gap:8px; align-items:center;"><i class="ti ti-${icon}" style="font-size:17px; color:${color};"></i><span id="saveText">${escapeHtml(statusText)}</span></span><button data-action="reload" style="border:1px solid ${c.border}; background:${c.inputBg}; color:${c.text}; font-size:12px; padding:6px 10px; border-radius:980px; cursor:pointer; white-space:nowrap;">Làm mới</button></div>`; }

function renderProjectList(list, c){
  const cards = list.map(p=>{ const s=projectStats(p); const alerts=projectDeadlineAlerts(p); const owner=isOwner(p); return `<div data-action="open" data-id="${p.id}" style="background:${c.card}; border:1px solid ${owner?c.accent:c.border}; border-radius:16px; padding:18px; cursor:pointer; ${cardEffect()}">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;"><div><p style="margin:0; font-size:17px; font-weight:820; color:${c.text}; line-height:1.35;">${escapeHtml(p.name)}</p><p style="margin:5px 0 0; font-size:13px; font-weight:700; color:${c.sub};"><i class="ti ti-user-circle" style="font-size:14px; vertical-align:-2px; margin-right:4px;"></i>${p.manager ? escapeHtml(p.manager) : 'Chưa đặt người quản lý'}</p><p style="margin:5px 0 0; font-size:12px; font-weight:760; color:${owner?c.accent:c.sub};"><i class="ti ti-${owner?'edit':'eye'}" style="vertical-align:-2px;"></i> ${owner?'Dự án của tôi - được sửa':'Chỉ xem/copy'} · ${escapeHtml(p.owner_email || 'không rõ email')}</p></div><span style="font-size:13px; font-weight:850; color:${c.accent}; background:${theme==='dark'?'rgba(10,22,38,0.58)':'rgba(255,255,255,0.72)'}; border:1px solid ${c.border}; border-radius:980px; padding:5px 8px; line-height:1;">${s.percent}%</span></div>
    <div style="height:6px; background:${c.border}; border-radius:4px; margin:12px 0 8px; overflow:hidden;"><div style="height:100%; width:${s.percent}%; background:${c.accent}; border-radius:4px;"></div></div>
    <p style="margin:0; font-size:12px; font-weight:720; color:${c.sub}; display:flex; align-items:center; justify-content:space-between; gap:8px;"><span>${s.done}/${s.total} công việc hoàn thành</span>${alerts ? `<span title="Có ${alerts} cảnh báo deadline/kế hoạch/phụ thuộc" style="color:${c.red}; font-weight:850; display:flex; align-items:center; gap:4px;"><i class="ti ti-bell-ringing"></i>${alerts}</span>` : ''}</p>
  </div>`; }).join('');
  return `<h2 style="margin:0 0 14px; font-size:18px; font-weight:600;"><i class="ti ti-folders" style="font-size:18px; vertical-align:-2px; margin-right:6px;"></i>Danh mục dự án</h2>${list.length ? `<div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(260px,1fr)); gap:14px;">${cards}</div>` : `<p style="color:${c.sub}; font-size:15px; padding:2rem 0; text-align:center; background:${c.card}; border:1px solid ${c.border}; border-radius:16px;">Chưa có dự án nào trong bộ lọc này.</p>`}`;
}

function renderProjectDetail(project, c){
  const owner = isOwner(project);
  const tasks = project.tasks || [];
  const filteredTasks = tasks.filter(t => taskMatchesProjectFilter(t, projectTaskFilter));
  const s = projectStats(project);
  const f = projectFunding(project);
  const alertSummary = projectAlertSummary(project);
  const compareStats = projectComparisonStats(project);
  const filterDefs = projectFilterDefinitions(project);
  const canDragSort = owner && projectTaskFilter === 'all';
  const taskRows = filteredTasks.map((t,idx)=>{
    const expanded=expandedTaskId===t.id;
    const ds=getDeadlineStatus(t);
    const deadlineText=formatDeadline(t.deadline_at);
    const cmp = getPlanComparison(t);
    const ext = getTaskExt(t);
    const depInfo = getDependencyInfo(t);
    const dependencyIds = ext.depends_on || [];
    const dependencyOptions = tasks.filter(x=>x.id!==t.id).map(dep=>`<option value="${dep.id}" ${dependencyIds.includes(dep.id)?'selected':''}>${escapeHtml(dep.name)}${dep.done?' (đã xong)':' (chưa xong)'}</option>`).join('');
    const dependencyNames = depInfo.unfinished.map(x=>x.name).join(', ');
    const dragTitle = canDragSort ? 'Nhấn giữ và kéo để sắp xếp công việc' : (owner ? 'Chỉ kéo-thả khi đang ở bộ lọc Tất cả' : 'Chỉ chủ dự án mới được sắp xếp');
    return `<div class="task-row-virtual ${expanded?'is-expanded':''}" data-task-row="${t.id}" draggable="${canDragSort?'true':'false'}" style="border-bottom:1px solid ${c.border}; cursor:${canDragSort?'grab':'default'};">
    <div style="display:flex; align-items:center; gap:8px; padding:14px 4px;">
      <span data-task-drag-handle title="${dragTitle}" style="width:26px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:${canDragSort?c.sub:c.border};cursor:${canDragSort?'grab':'not-allowed'};flex-shrink:0;"><i class="ti ti-grip-vertical" style="font-size:18px;"></i></span>
      <input type="checkbox" data-action="toggle" data-id="${t.id}" ${t.done?'checked':''} ${owner?'':'disabled'} style="width:20px; height:20px; cursor:${owner?'pointer':'not-allowed'}; flex-shrink:0; accent-color:${c.accent};"/>
      <div style="flex:1; min-width:0; cursor:pointer;" data-action="expand" data-id="${t.id}">
        <div class="task-title-text" style="font-size:15px; ${t.done?`opacity:.62; text-decoration:line-through;`:''}">${escapeHtml(t.name)}</div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:5px;">
          ${deadlineText ? `<span class="task-muted-text" style="font-size:12px; color:${ds.warn ? c.red : 'var(--project-readable-muted)'}; display:inline-flex; align-items:center; gap:5px;"><i class="ti ti-calendar-time"></i>Hạn: ${deadlineText}</span>` : `<span class="task-muted-text" style="font-size:12px;color:var(--project-readable-muted);display:inline-flex;align-items:center;gap:5px;"><i class="ti ti-calendar-off"></i>Chưa có hạn</span>`}
          ${planBadgeHtml(c, cmp)}
          ${depInfo.blocked ? `<span title="Công việc phụ thuộc chưa xong: ${escapeHtml(dependencyNames)}" style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:980px;background:${c.amber};color:#fff;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;"><i class="ti ti-git-branch" style="font-size:13px;"></i>Phụ thuộc chưa xong</span>` : ''}
        </div>
      </div>
      ${ds.warn ? `<span title="${ds.overdue?'Quá hạn nhưng chưa hoàn thành':'Còn dưới 2 ngày đến hạn'}" style="width:30px; height:30px; border-radius:50%; background:${ds.overdue?c.red:c.amber}; color:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0;"><i class="ti ti-bell-ringing" style="font-size:17px;"></i></span>` : ''}
      ${depInfo.blocked ? `<span title="Công việc phụ thuộc chưa xong: ${escapeHtml(dependencyNames)}" style="width:30px; height:30px; border-radius:50%; background:${c.amber}; color:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0;"><i class="ti ti-git-branch" style="font-size:17px;"></i></span>` : ''}
      <span style="font-size:12px; font-weight:500; padding:4px 12px; border-radius:980px; background:${t.done?c.green:c.amber}; color:#fff;white-space:nowrap;">${t.done?'Hoàn thành':'Chưa xong'}</span>
      <button data-action="expand" data-id="${t.id}" style="border:none; background:none; color:${c.sub}; cursor:pointer; padding:4px;"><i class="ti ti-chevron-${expanded?'up':'down'}" style="font-size:18px;"></i></button>
      <button data-action="deltask" data-id="${t.id}" ${owner?'':'disabled'} style="border:none; background:none; color:${owner?c.sub:c.border}; cursor:${owner?'pointer':'not-allowed'}; padding:4px;"><i class="ti ti-trash" style="font-size:17px;"></i></button>
    </div>
    ${expanded ? `<div style="padding:0 4px 16px 60px; display:grid; gap:14px;">
      <div>
        <label style="font-size:12px; color:${c.sub}; display:block; margin-bottom:6px;">Thời hạn hoàn thành / cảnh báo deadline</label>
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;"><input type="datetime-local" data-action="deadline" data-id="${t.id}" value="${deadlineInputValue(t.deadline_at)}" ${owner?'':'disabled'} style="font-size:14px; font-family:inherit; padding:10px 12px; border:1px solid ${ds.overdue?c.red:(ds.dueSoon?c.amber:c.border)}; border-radius:10px; background:${c.inputBg}; color:${c.text}; box-sizing:border-box; cursor:${owner?'auto':'not-allowed'};"/>${ds.warn ? `<span style="font-size:12px; color:${ds.overdue?c.red:c.amber}; font-weight:700; display:flex; align-items:center; gap:5px;"><i class="ti ti-bell-ringing"></i>${ds.overdue?'Quá hạn nhưng chưa hoàn thành':'Còn dưới 2 ngày đến hạn'}</span>` : `<span style="font-size:12px; color:${c.sub};">Tự cảnh báo: chuông vàng khi còn dưới 2 ngày, chuông đỏ khi quá hạn.</span>`}</div>
      </div>
      <div style="background:${c.info};border:1px solid ${c.border};border-radius:12px;padding:12px;">
        <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;"><h4 style="margin:0;font-size:15px;font-weight:650;"><i class="ti ti-calendar-stats" style="vertical-align:-2px;margin-right:5px;"></i>So sánh kế hoạch và thực tế</h4>${planBadgeHtml(c, cmp)}</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;">
          <div><label style="font-size:12px;color:${c.sub};display:block;margin-bottom:5px;">Bắt đầu kế hoạch</label><input type="date" data-action="plan_start" data-id="${t.id}" value="${ext.plan_start}" ${owner?'':'disabled'} style="width:100%;box-sizing:border-box;font-size:14px;padding:9px 10px;border:1px solid ${c.border};border-radius:10px;background:${c.inputBg};color:${c.text};"/></div>
          <div><label style="font-size:12px;color:${c.sub};display:block;margin-bottom:5px;">Kết thúc kế hoạch</label><input type="date" data-action="plan_end" data-id="${t.id}" value="${ext.plan_end}" ${owner?'':'disabled'} style="width:100%;box-sizing:border-box;font-size:14px;padding:9px 10px;border:1px solid ${cmp.isLate?c.red:c.border};border-radius:10px;background:${c.inputBg};color:${c.text};"/></div>
          <div><label style="font-size:12px;color:${c.sub};display:block;margin-bottom:5px;">Bắt đầu thực tế</label><input type="date" data-action="actual_start" data-id="${t.id}" value="${ext.actual_start}" ${owner?'':'disabled'} style="width:100%;box-sizing:border-box;font-size:14px;padding:9px 10px;border:1px solid ${c.border};border-radius:10px;background:${c.inputBg};color:${c.text};"/></div>
          <div><label style="font-size:12px;color:${c.sub};display:block;margin-bottom:5px;">Kết thúc thực tế</label><input type="date" data-action="actual_end" data-id="${t.id}" value="${ext.actual_end}" ${owner?'':'disabled'} style="width:100%;box-sizing:border-box;font-size:14px;padding:9px 10px;border:1px solid ${cmp.isLate?c.red:c.border};border-radius:10px;background:${c.inputBg};color:${c.text};"/></div>
        </div>
        <p style="margin:10px 0 0;font-size:12px;color:${cmp.isLate?c.red:c.sub};line-height:1.5;">${escapeHtml(cmp.status)}${ext.plan_start&&ext.plan_end?` · KH: ${formatDateOnly(ext.plan_start)} - ${formatDateOnly(ext.plan_end)}`:''}${ext.actual_start||ext.actual_end?` · TT: ${formatDateOnly(ext.actual_start)||'...'} - ${formatDateOnly(ext.actual_end)||'...'}`:''}</p>
      </div>
      <div style="background:${depInfo.blocked?c.softRed:c.info};border:1px solid ${depInfo.blocked?c.amber:c.border};border-radius:12px;padding:12px;">
        <h4 style="margin:0 0 8px;font-size:15px;font-weight:650;"><i class="ti ti-git-branch" style="vertical-align:-2px;margin-right:5px;color:${depInfo.blocked?c.amber:c.accent};"></i>Công việc phụ thuộc</h4>
        <select data-action="depends_on" data-id="${t.id}" multiple ${owner?'':'disabled'} style="width:100%;min-height:92px;box-sizing:border-box;font-size:13px;padding:8px 10px;border:1px solid ${depInfo.blocked?c.amber:c.border};border-radius:10px;background:${c.inputBg};color:${c.text};">
          ${dependencyOptions || '<option disabled>Chưa có công việc khác để chọn phụ thuộc</option>'}
        </select>
        <p style="margin:7px 0 0;font-size:12px;color:${depInfo.blocked?c.amber:c.sub};line-height:1.5;">${depInfo.blocked?`Cảnh báo dây chuyền: các việc phụ thuộc chưa xong gồm ${escapeHtml(dependencyNames)}.`:'Giữ Ctrl để chọn nhiều công việc phụ thuộc. Nếu việc phụ thuộc chưa hoàn thành, công việc này sẽ hiện cảnh báo dây chuyền.'}</p>
      </div>
      <div><label style="font-size:12px; color:${c.sub}; display:block; margin-bottom:6px;">Nội dung chi tiết</label><textarea data-action="notes" data-id="${t.id}" ${owner?'':'readonly'} placeholder="Mô tả chi tiết công việc, ghi chú tiến độ, vấn đề phát sinh..." style="width:100%; min-height:90px; resize:vertical; font-size:14px; font-family:inherit; padding:10px 12px; border:1px solid ${c.border}; border-radius:10px; background:${c.inputBg}; color:${c.text}; box-sizing:border-box;">${escapeHtml(stripInternalTaskNotes(t.notes||''))}</textarea></div>
    </div>` : ''}
  </div>`;
  }).join('');

  const filterButtons = filterDefs.map(([key,label,count,icon])=>`<button data-action="projecttaskfilter" data-filter="${key}" style="border:1px solid ${projectTaskFilter===key?c.accent:'var(--project-filter-border)'};background:${projectTaskFilter===key?c.accent:(theme==='dark'?'rgba(255,255,255,0.11)':'rgba(255,255,255,0.42)')};color:${projectTaskFilter===key?'#fff':'var(--project-readable-text)'};padding:8px 11px;border-radius:980px;cursor:pointer;font-size:12px;font-weight:750;display:flex;align-items:center;gap:5px;box-shadow:${projectTaskFilter===key?'0 10px 22px rgba(0,0,0,0.16)':'inset 0 1px 0 rgba(255,255,255,0.30)'};"><i class="ti ti-${icon}" style="font-size:15px;"></i>${label} <span style="opacity:.9;">${count}</span></button>`).join('');

  return `<div style="background:${theme==='dark'?'rgba(9,18,32,0.70)':'rgba(248,252,255,0.76)'};border:1px solid ${c.border};border-radius:16px;padding:14px 16px 16px;margin-bottom:24px;${cardEffect()}">
    <button data-action="home" style="border:none; background:${theme==='dark'?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.30)'}; color:${c.accent}; font-size:14px; font-weight:650; cursor:pointer; padding:7px 10px; margin-bottom:12px; border-radius:10px; display:flex; align-items:center; gap:4px;"><i class="ti ti-arrow-left" style="font-size:15px;"></i>Danh mục dự án</button>
    <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap;"><div><h2 style="margin:0; font-size:26px; font-weight:650; letter-spacing:0;">${escapeHtml(project.name)}</h2><p style="margin:6px 0 0; font-size:14px; color:${c.sub};"><i class="ti ti-user-circle" style="font-size:15px; vertical-align:-2px; margin-right:5px;"></i>Người quản lý: ${project.manager ? escapeHtml(project.manager) : 'Chưa đặt'} · Chủ dự án: ${escapeHtml(project.owner_email || 'không rõ')}</p><p style="margin:6px 0 0; font-size:13px; color:${owner?c.green:c.amber};"><i class="ti ti-${owner?'lock-open':'lock'}" style="vertical-align:-2px;"></i> ${owner?'Bạn là chủ dự án, được quyền sửa.':'Bạn chỉ được xem/copy, không được sửa dự án này.'}</p></div><div style="display:flex; gap:8px; flex-wrap:wrap;"><button data-action="copyproject" data-id="${project.id}" style="border:1px solid ${c.border}; background:${theme==='dark'?'rgba(255,255,255,0.10)':'rgba(255,255,255,0.34)'}; color:${c.text}; font-size:13px; padding:8px 14px; border-radius:980px; cursor:pointer;"><i class="ti ti-copy" style="vertical-align:-2px;"></i> Copy về tài khoản tôi</button><button data-action="delproject" data-id="${project.id}" ${owner?'':'disabled'} style="border:1px solid ${c.border}; background:${theme==='dark'?'rgba(120,30,38,0.18)':'rgba(255,238,238,0.34)'}; color:${owner?c.red:c.border}; font-size:13px; padding:8px 14px; border-radius:980px; cursor:${owner?'pointer':'not-allowed'};"><i class="ti ti-trash" style="vertical-align:-2px;"></i> Xóa dự án</button></div></div>
  </div>

    <div class="project-detail-shell">
      <aside class="project-stat-rail" style="background:${theme==='dark'?'rgba(9,18,32,0.76)':'rgba(248,252,255,0.82)'}; border:1px solid ${theme==='dark'?'rgba(232,244,255,0.48)':'rgba(255,255,255,0.92)'}; ${cardEffect()}">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px;">
          <h3 style="margin:0; font-size:15px; font-weight:700; letter-spacing:0; display:flex; align-items:center; gap:6px;"><i class="ti ti-layout-sidebar-left" style="font-size:17px; color:${c.accent};"></i>Tổng quan</h3>
          <span style="font-size:12px; font-weight:700; color:#fff; background:${c.accent}; border-radius:980px; padding:4px 8px; white-space:nowrap;">${s.percent}%</span>
        </div>
        <div class="project-stat-list">${[['Tổng công việc',s.total,c.text],['Đã hoàn thành',s.done,c.green],['Chưa hoàn thành',s.pending,c.amber],['Tiến độ',s.percent+'%',c.accent],['Quá hạn',alertSummary.overdue,c.red],['Sắp đến hạn',alertSummary.dueSoon,c.amber],['Phụ thuộc chưa xong',alertSummary.dependencyBlocked,c.amber],['Chậm kế hoạch',alertSummary.latePlan,c.red],['Thiếu kế hoạch',alertSummary.missingPlan,c.amber]].map(([label,val,col],idx,arr)=>`<div style="display:flex; align-items:center; justify-content:space-between; gap:10px; padding:9px 2px; border-bottom:${idx===arr.length-1?'none':'1px solid '+(theme==='dark'?'rgba(232,244,255,0.30)':'rgba(255,255,255,0.72)')}; min-height:34px;"><span class="project-stat-label" style="font-size:12.5px; font-weight:880; line-height:1.25;">${label}</span><strong style="font-size:20px; font-weight:850; color:${col}; line-height:1; white-space:nowrap; letter-spacing:0; text-shadow:0 1px 2px ${theme==='dark'?'rgba(0,0,0,0.48)':'rgba(255,255,255,0.60)'};">${val}</strong></div>`).join('')}</div>
      </aside>
      <section class="project-main-stack">

    ${renderAlertPanel(project, c)}

    <div style="background:${c.card};border:1px solid ${c.border};border-radius:16px;padding:18px;margin-bottom:20px;${cardEffect()}">
      <h3 style="margin:0 0 12px;font-size:17px;font-weight:650;"><i class="ti ti-calendar-stats" style="vertical-align:-2px;margin-right:6px;"></i>Tổng hợp kế hoạch - thực tế</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;">${[['Đúng/đang theo KH',compareStats.onTrack,c.green],['Chậm KH',compareStats.late,c.red],['Sớm KH',compareStats.early,c.green],['Thiếu ngày KH',compareStats.missingPlan,c.amber],['HT thiếu ngày TT',compareStats.missingActual,c.amber]].map(([label,val,col])=>`<div style="background:${c.inputBg};border:1px solid ${c.border};border-radius:12px;padding:12px;"><p style="margin:0 0 5px;font-size:12px;color:${c.sub};">${label}</p><p style="margin:0;font-size:22px;font-weight:750;color:${col};">${val}</p></div>`).join('')}</div>
      <p style="margin:10px 0 0;color:${c.sub};font-size:12px;line-height:1.5;">Mở từng công việc để nhập ngày bắt đầu/kết thúc kế hoạch và ngày thực tế. Dữ liệu này được lưu kèm công việc, không cần tạo thêm bảng Supabase.</p>
    </div>

    <div style="background:${c.card}; border:1px solid ${c.border}; border-radius:16px; padding:20px; margin-bottom:24px; ${cardEffect()}">
      <h3 style="margin:0 0 12px; font-size:18px; font-weight:650;"><i class="ti ti-wallet" style="vertical-align:-2px; margin-right:6px;"></i>Nguồn vốn</h3>
      <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:12px; align-items:start;">
        <div style="grid-column:1 / -1;"><label style="font-size:12px; color:${c.sub}; display:block; margin-bottom:6px;">Nguồn vốn</label><textarea data-action="funding_source" ${owner?'':'readonly'} placeholder="Ví dụ: Ngân sách tỉnh, ngân sách huyện, vốn sự nghiệp, vốn xã hội hóa..." style="width:100%; min-height:70px; resize:vertical; font-size:14px; font-family:inherit; padding:10px 12px; border:1px solid ${c.border}; border-radius:10px; background:${c.inputBg}; color:${c.text}; box-sizing:border-box;">${escapeHtml(stripGanttProjectSyncFromText(project.funding_source || ''))}</textarea></div>
        <div><label style="font-size:12px; color:${c.sub}; display:block; margin-bottom:6px;">Tổng vốn giao (đồng)</label><input data-action="total_budget" type="number" min="0" step="1" ${owner?'':'readonly'} value="${parseMoney(project.total_budget)}" style="width:100%; box-sizing:border-box; font-size:14px; padding:10px 12px; border:1px solid ${c.border}; border-radius:10px; background:${c.inputBg}; color:${c.text};"/><p id="totalBudgetText" style="margin:7px 0 0; font-size:12px; color:${c.sub};">${formatMoney(f.total)}</p></div>
        <div><label style="font-size:12px; color:${c.sub}; display:block; margin-bottom:6px;">Đã giải ngân (đồng)</label><input data-action="disbursed_amount" type="number" min="0" step="1" ${owner?'':'readonly'} value="${parseMoney(project.disbursed_amount)}" style="width:100%; box-sizing:border-box; font-size:14px; padding:10px 12px; border:1px solid ${c.border}; border-radius:10px; background:${c.inputBg}; color:${c.text};"/><p id="disbursedBudgetText" style="margin:7px 0 0; font-size:12px; color:${c.sub};">${formatMoney(f.disbursed)}</p></div>
        <div><label style="font-size:12px; color:${c.sub}; display:block; margin-bottom:6px;">Còn lại chưa giải ngân</label><div style="border:1px solid ${c.border}; border-radius:10px; padding:10px 12px; background:${c.inputBg}; font-size:14px; font-weight:700; color:${f.remaining < 0 ? c.red : c.green};" id="remainingBudgetText">${formatMoney(f.remaining)}</div><p style="margin:7px 0 0; font-size:12px; color:${c.sub};">Tự tính = Tổng vốn giao - Đã giải ngân.</p></div>
      </div>
    </div>

    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(320px,1fr)); gap:16px; margin-bottom:24px;">
      <div style="background:${c.card}; border:1px solid ${c.border}; border-radius:16px; padding:20px; ${cardEffect()}"><h3 style="margin:0 0 14px; font-size:17px; font-weight:650;">Biểu đồ danh sách công việc</h3><div style="display:flex; gap:24px; align-items:center; flex-wrap:wrap;"><div style="position:relative; width:150px; height:150px; flex-shrink:0;"><canvas id="donutChart"></canvas></div><div style="flex:1; min-width:200px; height:170px; position:relative;"><canvas id="barChart"></canvas></div></div></div>

function attachProjectTaskDragSort(project){
  if(!project || !isOwner(project) || projectTaskFilter !== 'all') return;
  let draggingRow = null;
  let changed = false;
  let committed = false;
  const rows = Array.from(root.querySelectorAll('[data-task-row]'));
  if(rows.length < 2) return;

  const clearOver = () => rows.forEach(r => r.classList.remove('drag-sort-over'));
  const commitOrder = () => {
    if(committed || !changed) return;
    committed = true;
    const orderedIds = Array.from(root.querySelectorAll('[data-task-row]')).map(r=>r.dataset.taskRow).filter(Boolean);
    reorderProjectTasks(project.id, orderedIds);
  };

  rows.forEach(row=>{
    row.addEventListener('dragstart', e=>{
      const interactive = e.target && e.target.closest && e.target.closest('input, textarea, select, button, [data-action="expand"], [data-action="toggle"], [data-action="deadline"], [data-action="notes"]');
      if(interactive){ e.preventDefault(); return; }
      draggingRow = row;
      changed = false;
      committed = false;
      row.classList.add('drag-sort-ghost');
      if(e.dataTransfer){
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', row.dataset.taskRow || '');
      }
    });
    row.addEventListener('dragend', ()=>{
      if(draggingRow) draggingRow.classList.remove('drag-sort-ghost');
      clearOver();
      // Có trình duyệt chỉ thay đổi DOM trong dragover nhưng không bắn drop đúng vào dòng.
      // Vì vậy chốt thứ tự ở dragend để tránh tick/render lại làm nhảy về thứ tự cũ.
      setTimeout(commitOrder, 0);
      draggingRow = null;
    });
    row.addEventListener('dragover', e=>{
      if(!draggingRow || draggingRow === row) return;
      e.preventDefault();
      const rect = row.getBoundingClientRect();
      const after = e.clientY > rect.top + rect.height / 2;
      const beforeNode = after ? row.nextSibling : row;
      if(beforeNode !== draggingRow){
        row.parentNode.insertBefore(draggingRow, beforeNode);
        changed = true;
      }
      clearOver();
      row.classList.add('drag-sort-over');
    });
    row.addEventListener('drop', e=>{
      e.preventDefault();
      clearOver();
      commitOrder();
    });
  });
}

// ==================== GANTT MODULE ====================
(function(){

// --- Storage helpers ---
// Dữ liệu Gantt được lưu theo từng dự án. localStorage chỉ là bộ đệm nhanh;
// bản chính của các công việc liên kết sẽ được ghi ẩn vào Supabase qua cột notes.
let ganttSupabaseSaveTimer = null;
function ganttStorageKey(){
  const uid = currentUser && currentUser.id ? currentUser.id : 'guest';
  const pid = currentProjectId || 'no_project';
  return `gantt_tasks_v3_${uid}_${pid}`;
}
function ganttMetaKey(){
  const uid = currentUser && currentUser.id ? currentUser.id : 'guest';
  const pid = currentProjectId || 'no_project';
  return `gantt_meta_v3_${uid}_${pid}`;
}
function ganttSave(){
  try{
    localStorage.setItem(ganttStorageKey(), JSON.stringify(ganttTasks));
    localStorage.setItem(ganttMetaKey(), JSON.stringify({ name: ganttProjectName, date: ganttReportDate }));
  }catch(e){}

  // Cực quan trọng: cập nhật ngay bản ghi cục bộ của dự án.
  // Nếu chưa làm bước này, vừa kéo-thả xong mà tick/render lại thì syncGanttFromProject()
  // sẽ đọc funding_source cũ và kéo công việc về vị trí cũ trước khi Supabase kịp lưu.
  updateLocalGanttProjectSnapshot();
  scheduleGanttSupabaseSave();
}
function ganttLoad(){
  if(!currentProjectId){ ganttTasks=[]; ganttProjectName=''; ganttReportDate=''; return; }
  try{ const t = localStorage.getItem(ganttStorageKey()); ganttTasks = t ? JSON.parse(t) : []; } catch(e){ ganttTasks=[]; }
  try{ const m = localStorage.getItem(ganttMetaKey()); if(m){ const o=JSON.parse(m); ganttProjectName=o.name||''; ganttReportDate=o.date||''; } }catch(e){}
}
function buildGanttProjectPayload(){
  return {
    name: ganttProjectName || '',
    date: ganttReportDate || '',
    // Lưu đúng thứ tự đang thấy trên Gantt, kể cả khi công việc tự thêm được kéo xen giữa công việc liên kết.
    order: ganttTasks.map(t => t.projectTaskId ? `linked:${t.projectTaskId}` : `unlinked:${t.id}`),
    unlinked: ganttTasks.filter(t => !t.projectTaskId).map(t => ({
      id: t.id || uid(),
      wbs: t.wbs || '',
      name: t.name || '',
      start: t.start || '',
      end: t.end || '',
      progress: Math.min(100, Math.max(0, Number(t.progress) || 0)),
      unit: ganttUnit(t),
      notes: t.notes || ''
    }))
  };
}
function updateLocalGanttProjectSnapshot(){
  const project = projects.find(p => p.id === currentProjectId);
  if(!project) return;
  const nextFundingSource = setGanttProjectSyncInText(project.funding_source || '', buildGanttProjectPayload());
  if(nextFundingSource !== (project.funding_source || '')){
    touchLocalProject(project.id, { funding_source: nextFundingSource });
  }
}
function scheduleGanttSupabaseSave(){
  if(!currentProjectId || !currentUser || !db) return;
  const project = projects.find(p => p.id === currentProjectId);
  if(!project || !isOwner(project)) return;
  clearTimeout(ganttSupabaseSaveTimer);
  saving = true;
  statusOk = true;
  statusText = 'Đang tự động lưu Gantt...';
  renderSaveText();
  ganttSupabaseSaveTimer = setTimeout(saveGanttToSupabase, 700);
}
async function saveGanttToSupabase(){
  const project = projects.find(p => p.id === currentProjectId);
  if(!project || !isOwner(project) || !db){ saving=false; renderSaveText(); return; }
  const updates = [];
  const projectTasks = project.tasks || [];
  for(const gt of ganttTasks){
    if(!gt.projectTaskId) continue;
    const pt = projectTasks.find(x => x.id === gt.projectTaskId);
    if(!pt) continue;
    const payload = {
      wbs: gt.wbs || '',
      start: gt.start || '',
      end: gt.end || '',
      progress: Math.min(100, Math.max(0, Number(gt.progress) || 0)),
      unit: ganttUnit(gt),
      notes: gt.notes || ''
    };
    const nextNotes = setGanttSyncInNotes(pt.notes || '', payload);
    if(nextNotes !== (pt.notes || '')){
      touchLocalTask(pt.id, { notes: nextNotes });
      updates.push(db.from('tasks').update({ notes: nextNotes, updated_at: nowIso() }).eq('id', pt.id));
    }
  }
  // Lưu thêm meta và các công việc Gantt tạo riêng trực tiếp trong Gantt vào trường Nguồn vốn của dự án.
  // Khi hiển thị Nguồn vốn, đoạn kỹ thuật này được ẩn khỏi người dùng.
  const nextFundingSource = setGanttProjectSyncInText(project.funding_source || '', buildGanttProjectPayload());
  // Luôn đẩy snapshot Gantt hiện tại lên Supabase. Trước đó ganttSave() đã cập nhật cục bộ,
  // nên nếu chỉ so sánh chuỗi sẽ tưởng là không đổi và bỏ qua lưu thật lên server.
  touchLocalProject(project.id, { funding_source: nextFundingSource });
  updates.push(db.from('projects').update({ funding_source: nextFundingSource, updated_at: nowIso() }).eq('id', project.id));

  try{
    if(updates.length){
      const results = await Promise.all(updates);
      const err = results.find(r => r && r.error);
      if(err) throw err.error;
    }
    statusOk = true;
    statusText = 'Đã tự động lưu Gantt.';
  }catch(e){
    console.error(e);
    statusOk = false;
    statusText = 'Không lưu được Gantt lên Supabase. Kiểm tra quyền sửa dự án hoặc kết nối mạng.';
  }
  saving = false;
  renderSaveText();
}

// --- Date helpers ---
function parseDate(s){ const d=new Date(s); return isNaN(d)?null:d; }
function formatDateVN(s){ const d=parseDate(s); if(!d) return ''; return d.toLocaleDateString('vi-VN'); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/(86400000)); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function toInputDate(d){ if(!d) return ''; const dt=new Date(d); if(isNaN(dt)) return ''; return dt.toISOString().slice(0,10); }
function todayStr(){ return new Date().toISOString().slice(0,10); }

// --- Stats ---
function ganttStats(){
  const today = new Date();
  let done=0, late=0, ongoing=0, delayDays=0;
  ganttTasks.forEach(t=>{
    if(!t.start||!t.end) return;
    const end=new Date(t.end); const start=new Date(t.start);
    const prog=Number(t.progress)||0;
    if(prog>=100){ done++; return; }
    if(end < today){ late++; } else { ongoing++; }
    // estimate delay
    if(end < today){
      delayDays = Math.max(delayDays, Math.round((today-end)/86400000));
    }
  });
  return { total: ganttTasks.length, done, late, ongoing, delayDays };
}

// --- Color per progress ---
function ganttBarColor(t){
  const prog=Number(t.progress)||0;
  const end=new Date(t.end);
  const today=new Date();
  if(prog>=100) return '#3d8b72';
  if(end<today) return '#c75b4b';  // overdue
  if(prog>0) return '#b98338';     // in progress (orange)
  return '#2f6b8a';                // not started
}

// --- UUID ---
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function ganttUnit(t){ return t && t.unit ? String(t.unit) : ''; }

// --- Excel Export ---
function exportGanttExcel(){
  if(!window.XLSX){ alert('Thư viện XLSX chưa tải xong, thử lại sau vài giây.'); return; }
  const wb = XLSX.utils.book_new();

  // Sheet 1: Danh sách công việc
  const listHeaders = ['WBS','Nội dung công việc','Đơn vị thực hiện','Bắt đầu','Kết thúc','Tiến độ (%)','Số ngày','Ghi chú'];
  const listRows = ganttTasks.map(t=>([
    t.wbs||'',
    t.name||'',
    ganttUnit(t),
    t.start ? new Date(t.start).toLocaleDateString('vi-VN') : '',
    t.end   ? new Date(t.end).toLocaleDateString('vi-VN')   : '',
    Number(t.progress)||0,
    (t.start&&t.end) ? daysBetween(t.start,t.end) : '',
    t.notes||''
  ]));
  const listData = [listHeaders, ...listRows];
  const ws1 = XLSX.utils.aoa_to_sheet(listData);
  ws1['!cols']=[{wch:8},{wch:40},{wch:24},{wch:14},{wch:14},{wch:14},{wch:10},{wch:30}];
  // Style header row
  const headerRange = XLSX.utils.decode_range(ws1['!ref']);
  for(let C=headerRange.s.c; C<=headerRange.e.c; C++){
    const cellAddr = XLSX.utils.encode_cell({r:0,c:C});
    if(ws1[cellAddr]) ws1[cellAddr].s = { font:{bold:true}, fill:{fgColor:{rgb:'2f6b8a'}}, alignment:{horizontal:'center'} };
  }
  XLSX.utils.book_append_sheet(wb, ws1, 'Danh sách công việc');

  // Sheet 2: Gantt timeline (text-based calendar grid)
  if(ganttTasks.length>0 && ganttTasks.some(t=>t.start&&t.end)){
    const validTasks = ganttTasks.filter(t=>t.start&&t.end);
    const minDate = new Date(Math.min(...validTasks.map(t=>new Date(t.start))));
    const maxDate = new Date(Math.max(...validTasks.map(t=>new Date(t.end))));
    const totalDays = daysBetween(minDate.toISOString(), maxDate.toISOString()) + 1;

    // Build date columns (group by month)
    const dateCols = [];
    for(let i=0;i<totalDays;i++){
      const d = addDays(minDate, i);
      dateCols.push(d);
    }

    // Header row 1: Months
    const monthRow = ['WBS','Nội dung công việc','Đơn vị thực hiện','Bắt đầu','Kết thúc','%'];
    let prevMonth = '';
    dateCols.forEach(d=>{
      const m = d.toLocaleDateString('vi-VN',{month:'2-digit',year:'numeric'});
      monthRow.push(m !== prevMonth ? m : '');
      prevMonth = m;
    });

    // Header row 2: Day numbers
    const dayRow = ['','','','','',''];
    dateCols.forEach(d=> dayRow.push(d.getDate()));

    // Data rows
    const dataRows = ganttTasks.map(t=>{
      const row = [t.wbs||'', t.name||'', ganttUnit(t),
        t.start ? new Date(t.start).toLocaleDateString('vi-VN') : '',
        t.end   ? new Date(t.end).toLocaleDateString('vi-VN')   : '',
        (Number(t.progress)||0)+'%'
      ];
      if(t.start&&t.end){
        const tStart=new Date(t.start); const tEnd=new Date(t.end);
        dateCols.forEach(d=>{
          if(d>=tStart && d<=tEnd) row.push('█');
          else row.push('');
        });
      } else {
        dateCols.forEach(()=>row.push(''));
      }
      return row;
    });

    const ganttAoa = [monthRow, dayRow, ...dataRows];
    const ws2 = XLSX.utils.aoa_to_sheet(ganttAoa);
    const fixedCols = [{wch:8},{wch:35},{wch:24},{wch:12},{wch:12},{wch:6}];
    const dayWidths = dateCols.map(()=>({wch:3}));
    ws2['!cols']=[...fixedCols,...dayWidths];
    XLSX.utils.book_append_sheet(wb, ws2, 'Biểu đồ Gantt');
  }

  // Sheet 3: Tổng hợp tiến độ
  const st = ganttStats();
  const summaryData = [
    ['BÁO CÁO TIẾN ĐỘ DỰ ÁN'],
    ['Tên dự án:', ganttProjectName],
    ['Ngày báo cáo:', ganttReportDate ? new Date(ganttReportDate).toLocaleDateString('vi-VN') : new Date().toLocaleDateString('vi-VN')],
    [],
    ['Chỉ tiêu','Giá trị'],
    ['Tổng số công việc', st.total],
    ['Hoàn thành (100%)', st.done],
    ['Đang tiến hành', st.ongoing],
    ['Trễ tiến độ', st.late],
    ['Dự án trễ ước tính (ngày)', st.delayDays],
  ];
  const ws3 = XLSX.utils.aoa_to_sheet(summaryData);
  ws3['!cols']=[{wch:30},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws3, 'Tổng hợp');

  const fn = (ganttProjectName||'SoDoGantt').replace(/[^a-zA-Z0-9\u00C0-\u024F\s]/g,'_') + '_' + todayStr() + '.xlsx';
  XLSX.writeFile(wb, fn);
}

              <div style="display:flex;align-items:center;gap:6px;">
                <div style="flex:1;height:8px;background:${c.border};border-radius:4px;overflow:hidden;min-width:40px;">

                </div>
                <span style="font-size:12px;font-weight:600;color:${barColor};min-width:30px;">${prog}%</span>
              </div>

            <td style="${tdStyle}color:${c.sub};font-size:12px;">${escapeHtml(t.notes||'')}</td>
            <td style="${tdCenterStyle};white-space:nowrap;">
              <button data-gantt-edit="${t.id}" style="border:none;background:none;color:${c.accent};cursor:pointer;padding:5px 8px;border-radius:6px;" title="Chỉnh sửa ngày, tiến độ"><i class="ti ti-edit" style="font-size:16px;"></i></button>
              <button data-gantt-del="${t.id}" data-gantt-linked="${isLinked}" style="border:none;background:none;color:${c.red};cursor:pointer;padding:5px 8px;border-radius:6px;" title="${isLinked?'Xóa liên kết (sẽ tự thêm lại nếu task còn trong dự án)':'Xóa'}"><i class="ti ti-${isLinked?'unlink':'trash'}" style="font-size:16px;"></i></button>
            </td>

    const tableHtml = syncBannerHtml + `<div style="${cardStyle}overflow:hidden;padding:0;">
      <div style="padding:16px 20px;border-bottom:1px solid ${c.border};display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
        <h3 style="margin:0;font-size:16px;font-weight:650;"><i class="ti ti-list-details" style="vertical-align:-2px;margin-right:6px;color:${c.accent};"></i>Danh sách công việc (${ganttTasks.length})</h3><span style="font-size:12px;color:${c.sub};"><i class="ti ti-arrows-move" style="vertical-align:-2px;"></i> Kéo thả tại đây để sắp xếp; Biểu đồ Gantt sẽ lấy đúng thứ tự này</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button id="gantt-clear-btn" style="border:1px solid ${c.border};background:${c.card};color:${c.red};font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer;">
            <i class="ti ti-trash" style="vertical-align:-2px;"></i> Xóa tất cả</button>
          <button id="gantt-export-btn" style="border:none;background:${c.green};color:#fff;font-size:13px;font-weight:600;padding:7px 14px;border-radius:8px;cursor:pointer;">
            <i class="ti ti-file-spreadsheet" style="vertical-align:-2px;margin-right:4px;"></i>Xuất Excel</button>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;min-width:860px;">
          <thead>
            <tr>
              <th style="${thStyle}width:70px;">WBS</th>
              <th style="${thStyle}min-width:200px;">Nội dung công việc</th>
              <th style="${thStyle}min-width:150px;">Đơn vị thực hiện</th>
              <th style="${thStyle}width:110px;">Bắt đầu</th>

            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>`;

    contentHtml = formHtml + tableHtml;

  } else {
    // --- GANTT CHART ---
    contentHtml = renderGanttChart(c, cardStyle);
  }

  return `

      <h3 style="margin:0 0 14px;font-size:16px;font-weight:650;"><i class="ti ti-settings" style="vertical-align:-2px;margin-right:6px;color:${c.accent};"></i>Thông tin báo cáo</h3>
